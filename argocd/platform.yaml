# Platform — App-of-Apps that manages all platform components.
# Child apps: platform-config, gpu-operator, kuberay-operator, litellm, open-webui.
# Owned by the platform team. Teams interact via models.yaml and teams.yaml only.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radudobrinescu/ai-platform-eks.git
    targetRevision: main
    path: argocd/platform
  destination:
    name: local-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
