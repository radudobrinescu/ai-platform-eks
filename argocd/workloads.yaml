# Workloads — syncs InferenceEndpoint instances
# Self-service: teams add model YAMLs here to deploy inference endpoints.
# Team onboarding is managed by a separate ArgoCD Application (teams.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: models
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radudobrinescu/ai-platform-eks.git
    targetRevision: main
    path: workloads/models
  destination:
    name: local-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
