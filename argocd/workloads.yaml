# Workloads — syncs namespaces, KRO definitions, and model workloads
# Teams are managed by a separate ArgoCD Application (teams.yaml)
# once the AITeam KRO definition is ready.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radudobrinescu/ai-platform-eks.git
    targetRevision: main
    path: platform
    directory:
      recurse: true
      exclude: "{apps/**/*,workloads/teams/**/*}"
  destination:
    name: local-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
