# Platform Config — syncs KRO definitions, RBAC, and ingress.
# Namespaces are managed by Terraform (not in this directory).
# Owned by the platform team. Changes here affect the platform APIs and routing.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radudobrinescu/ai-platform-eks.git
    targetRevision: main
    path: platform/config
    directory:
      recurse: true
  destination:
    name: local-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
