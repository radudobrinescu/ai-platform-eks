# Workloads — ArgoCD ApplicationSet for self-service workloads.
#
# - models:      syncs workloads/models/ → creates InferenceEndpoint CRs.
#                Teams add a YAML here to deploy a model. Recurses into
#                catalog/ for platform-shipped default models.
# - teams:       syncs workloads/teams/ → creates AITeam CRs.
#                Platform team adds a YAML here to onboard a new team.
# - fine-tuning: syncs workloads/fine-tuning/ → creates FineTuneJob CRs.
#                Users add a YAML here to fine-tune a model.
#
# Forking = change the literal URL below + the two URLs in
# argocd/bootstrap/platform.yaml, and set var.gitops_repo_url in Terraform.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: models
            path: workloads/models
          - name: teams
            path: workloads/teams
          - name: fine-tuning
            path: workloads/fine-tuning
  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: ai-platform
        tier: workloads
    spec:
      project: default
      source:
        repoURL: https://github.com/radudobrinescu/ai-platform-eks.git
        targetRevision: main
        path: '{{.path}}'
        # Recurse so platform-shipped models in workloads/models/catalog/ are
        # synced alongside user-added models in workloads/models/. Harmless for
        # the flat teams/ dir; ArgoCD ignores non-manifest files (.example, .gitkeep).
        directory:
          recurse: true
      destination:
        name: local-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
