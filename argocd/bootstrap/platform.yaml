# Platform — ArgoCD ApplicationSet defining all platform services.
#
# Eight applications (by default) in two shapes:
#   - Plain-directory sources (platform-config, litellm, open-webui,
#     cluster-dashboard, litellm-sync): manifests live in this repo and are
#     applied as-is.
#   - Helm multi-source (gpu-operator, kuberay-operator, langfuse):
#       chart pulled from upstream, values file pulled from this repo.
#
# The optional platform-health-agent is NOT listed (opt-in — see the note by
# cluster-dashboard below and its README).
#
# FORKING THE PLATFORM — three coordinated settings (ArgoCD ApplicationSet
# generators can't read a Terraform variable, so the repo URL lives in git, not
# in tfvars; Terraform only renders the root `bootstrap` Application):
#   1. var.gitops_repo_url / var.gitops_revision in your tfvars  → the root bootstrap app
#   2. $repo / $rev in the templatePatch below (set ONCE, used by all apps here)
#   3. repoURL / targetRevision in argocd/bootstrap/workloads.yaml (set ONCE there)
# Points 2 and 3 must match point 1. Default placeholder: YOUR-ORG/YOUR-REPO.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          # --- Infrastructure (hidden in day-to-day, always healthy) ---
          - name: platform-config
            namespace: argocd
            type: directory
            path: platform/config
            recurse: "true"
            tier: infra
          - name: gpu-operator
            namespace: gpu-operator
            type: helm
            chart: gpu-operator
            chartRepo: https://helm.ngc.nvidia.com/nvidia
            chartVersion: v25.10.1
            valuesPath: platform/services/gpu-operator/helm-values.yaml
            tier: infra
          - name: kuberay-operator
            namespace: kuberay
            type: helm
            chart: kuberay-operator
            chartRepo: https://ray-project.github.io/kuberay-helm/
            chartVersion: "1.5.1"
            valuesPath: platform/services/kuberay/helm-values.yaml
            tier: infra
          # --- Platform Services (user-facing) ---
          - name: litellm
            namespace: ai-platform
            type: directory
            path: platform/services/litellm
            tier: platform
          - name: open-webui
            namespace: ai-platform
            type: directory
            path: platform/services/open-webui
            tier: platform
          - name: langfuse
            namespace: ai-platform
            type: helm
            chart: langfuse
            chartRepo: https://langfuse.github.io/langfuse-k8s
            chartVersion: "1.5.20"
            valuesPath: platform/services/langfuse/helm-values.yaml
            tier: platform
          - name: cluster-dashboard
            namespace: ai-platform
            type: directory
            path: platform/services/cluster-dashboard
            tier: platform
          # NOTE: platform-health-agent is intentionally NOT listed here. It is
          # an OPT-IN service: its namespace + secrets are provisioned by
          # Terraform only when platform_health_agent_enabled=true (default
          # false). Listing it unconditionally would leave a permanently
          # Degraded app on a default deploy (no platform-db-credentials secret
          # in its namespace). To enable: set the tfvar (+ TF_VAR_kiro_api_key),
          # apply, then add the element back here. See
          # platform/services/platform-health-agent/README.md (Enable / disable).
          # Keeps LiteLLM's model registry in sync with InferenceEndpoints
          # (deregisters a model on IE deletion via a finalizer). Lives in the
          # `inference` namespace alongside the endpoints it watches.
          - name: litellm-sync
            namespace: inference
            type: directory
            path: platform/services/litellm-sync
            tier: platform
  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: ai-platform
        tier: '{{.tier}}'
    spec:
      project: default
      destination:
        name: local-cluster
        namespace: '{{.namespace}}'
      ignoreDifferences:
        - group: nvidia.com
          kind: ClusterPolicy
          jsonPointers:
            - /spec
        - group: apps
          kind: StatefulSet
          jsonPointers:
            - /spec/persistentVolumeClaimRetentionPolicy
            - /spec/podManagementPolicy
            - /spec/revisionHistoryLimit
            - /spec/updateStrategy
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  templatePatch: |
    {{- /* Fork point: set your repo URL + branch ONCE here (used by both the */ -}}
    {{- /* directory source and the Helm $values source below). Mirror the same */ -}}
    {{- /* value in argocd/bootstrap/workloads.yaml. */ -}}
    {{- $repo := "https://github.com/radudobrinescu/ai-platform-eks.git" }}
    {{- $rev := "main" }}
    spec:
      {{- if eq .type "directory" }}
      source:
        repoURL: {{ $repo }}
        targetRevision: {{ $rev }}
        path: {{ .path }}
        {{- if eq .recurse "true" }}
        directory:
          recurse: true
        {{- end }}
      {{- end }}
      {{- if eq .type "helm" }}
      sources:
        - repoURL: {{ .chartRepo }}
          chart: {{ .chart }}
          targetRevision: {{ .chartVersion }}
          helm:
            valueFiles:
              - $values/{{ .valuesPath }}
        - repoURL: {{ $repo }}
          targetRevision: {{ $rev }}
          ref: values
      {{- end }}
