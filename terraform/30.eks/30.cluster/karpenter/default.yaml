---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  disruption:
    budgets:
    - nodes: 10%
    consolidateAfter: 5m
    consolidationPolicy: WhenEmptyOrUnderutilized
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: [nano, micro, small, medium]
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: bottlerocket@latest
  metadataOptions:
    # Bottlerocket runs pluto (the metadata fetcher) inside a container, so
    # IMDS responses need to traverse one extra network hop. The Karpenter
    # default of 1 leaves pluto unable to reach IMDS — node never registers.
    # See: https://github.com/bottlerocket-os/bottlerocket/issues/3399
    httpPutResponseHopLimit: 2
    httpTokens: required
    httpEndpoint: enabled
  blockDeviceMappings:
    - deviceName: /dev/xvdb
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
  role: ${role}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Name: ${cluster_name}-private-*
        Environment: ${environment}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Environment: ${environment}
  userData: |
    [settings.container-runtime]
    snapshotter = "soci"
    # Bare SOCI lazy-loading (no parallel-pull-unpack). PPU eagerly unpacks all
    # layers concurrently and PANICS the Bottlerocket snapshotter on large
    # multi-GB-layer images (see gpu-inference.yaml + commit eb34028). Kept bare
    # here to match the GPU pools; the platform services that use this pool have
    # small images for which PPU gave no meaningful benefit anyway.
  tags:
    karpenter.sh/discovery: ${cluster_name}
    Environment: ${environment}
    provisioned-by: "aws-solutions-library-samples/guidance-for-automated-provisioning-of-application-ready-amazon-eks-clusters"