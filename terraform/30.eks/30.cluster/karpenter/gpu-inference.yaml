---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu-inference
spec:
  amiSelectorTerms:
    - alias: bottlerocket@latest
  metadataOptions:
    # Hop limit 2 required so Bottlerocket's pluto (containerised) can reach
    # IMDS to fetch the private DNS name during bootstrap.
    httpPutResponseHopLimit: 2
    httpTokens: required
    httpEndpoint: enabled
  role: ${role}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Name: ${cluster_name}-private-*
        Environment: ${environment}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Environment: ${environment}
  blockDeviceMappings:
    - deviceName: /dev/xvdb
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        encrypted: true
        throughput: 500
        iops: 6000
  userData: |
    [settings.container-runtime]
    snapshotter = "soci"
    [settings.container-runtime-plugins.soci-snapshotter]
    pull-mode = "parallel-pull-unpack"
    [settings.container-runtime-plugins.soci-snapshotter.parallel-pull-unpack]
    max-concurrent-downloads-per-image = 10
    concurrent-download-chunk-size = "16mb"
    max-concurrent-unpacks-per-image = 10
    discard-unpacked-layers = true
  tags:
    karpenter.sh/discovery: ${cluster_name}
    Environment: ${environment}
    workload-type: gpu-inference
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-inference
spec:
  weight: 50
  template:
    metadata:
      labels:
        workload-type: gpu-inference
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-inference
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      # All NVIDIA-backed AWS GPU instance categories (G and P families).
      # Karpenter's scheduler already bin-packs to cheapest-fit, so we don't
      # enumerate families — new ones (g7, p6, ...) become eligible automatically.
      # Cost blast-radius is bounded by `limits.nvidia.com/gpu` below.
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["g", "p"]
        - key: karpenter.k8s.aws/instance-gpu-manufacturer
          operator: In
          values: ["nvidia"]
  # Cost cap: max 16 NVIDIA GPUs provisioned by this NodePool at any time.
  # With P5 at 8 GPUs/node this caps worst-case hourly spend; raise/lower to taste.
  limits:
    nvidia.com/gpu: "16"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 300s
    budgets:
      - nodes: "1"
