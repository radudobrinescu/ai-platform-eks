---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu-inference
spec:
  amiSelectorTerms:
    - alias: bottlerocket@latest
  metadataOptions:
    # Hop limit 2 required so Bottlerocket's pluto (containerised) can reach
    # IMDS to fetch the private DNS name during bootstrap.
    httpPutResponseHopLimit: 2
    httpTokens: required
    httpEndpoint: enabled
  role: ${role}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Name: ${cluster_name}-private-*
        Environment: ${environment}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Environment: ${environment}
  blockDeviceMappings:
    - deviceName: /dev/xvdb
      ebs:
        volumeSize: ${gpu_volume_size}Gi
        volumeType: gp3
        encrypted: true
        throughput: 500
        iops: 6000
        ${gpu_snapshot_id_line}
  userData: |
    [settings.container-runtime]
    snapshotter = "soci"
    # Classic SOCI lazy-loading (FUSE). We deliberately do NOT enable
    # `pull-mode = "parallel-pull-unpack"`: PPU eagerly downloads + unpacks all
    # layers concurrently and the Bottlerocket snapshotter PANICS mid-unpack on
    # large multi-GB-layer images (e.g. the ~14.5 GiB Unsloth trainer built on
    # nvcr.io/nvidia/pytorch), surfacing to the kubelet as
    # "reading from server: EOF". The EBS data-volume snapshot is baked with
    # bare `snapshotter = "soci"` too, so this matches the baked content store
    # and keeps ray-llm cold-start at ~0s. Large GPU images should be pre-baked
    # into the snapshot (image-optimization.tf); the SOCI index is the fallback.
  tags:
    karpenter.sh/discovery: ${cluster_name}
    Environment: ${environment}
    workload-type: gpu-inference
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-inference
spec:
  weight: 50
  template:
    metadata:
      labels:
        workload-type: gpu-inference
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-inference
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      # All NVIDIA-backed AWS GPU instance categories (G and P families).
      # Karpenter's scheduler already bin-packs to cheapest-fit, so we don't
      # enumerate families — new ones (g7, p6, ...) become eligible automatically.
      # Cost blast-radius is bounded by `limits.nvidia.com/gpu` below.
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["g", "p"]
        - key: karpenter.k8s.aws/instance-gpu-manufacturer
          operator: In
          values: ["nvidia"]
        # Exclude pre-Ampere NVIDIA GPUs (T4 in g4dn, V100 in p3). Modern
        # vLLM model defaults use bfloat16, which requires compute capability
        # ≥ 8.0 (Ampere/Ada/Hopper). T4 is CC 7.5, V100 is CC 7.0.
        - key: karpenter.k8s.aws/instance-family
          operator: NotIn
          values: ["g4dn", "g4ad", "p3", "p2"]
  # Cost cap: max 16 NVIDIA GPUs provisioned by this NodePool at any time.
  # With P5 at 8 GPUs/node this caps worst-case hourly spend; raise/lower to taste.
  limits:
    nvidia.com/gpu: "16"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 300s
    budgets:
      - nodes: "1"
