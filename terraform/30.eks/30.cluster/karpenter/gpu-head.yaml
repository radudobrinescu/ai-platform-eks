---
# Dedicated CPU pool for Ray HEAD pods.
#
# The Ray head runs the Serve controller (ray.serve.llm:build_openai_app), which
# imports vLLM, so it needs the heavy ~13 GiB anyscale/ray-llm image — but it
# requests NO GPU. Previously the head was pinned to the gpu-shared pool purely
# so the pre-pulled image gave a fast start; for dedicated (shared:false) models
# that meant spinning up a whole extra GPU node just to host a CPU-only process.
#
# This pool fixes that: CPU instances (no GPU, untainted), but it carries the
# SAME EBS image snapshot as the GPU pools (the /dev/xvdb containerd content-store
# layout is identical on non-NVIDIA hosts — see ops/create-data-volume-snapshot.sh),
# so the head's image is already on disk → ~0s pull, no GPU wasted.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu-head
spec:
  amiSelectorTerms:
    - alias: bottlerocket@latest
  metadataOptions:
    # Hop limit 2 so Bottlerocket's containerised pluto can reach IMDS at boot.
    httpPutResponseHopLimit: 2
    httpTokens: required
    httpEndpoint: enabled
  role: ${role}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Name: ${cluster_name}-private-*
        Environment: ${environment}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${cluster_name}
        Environment: ${environment}
  blockDeviceMappings:
    - deviceName: /dev/xvdb
      ebs:
        volumeSize: ${gpu_volume_size}Gi
        volumeType: gp3
        encrypted: true
        throughput: 500
        iops: 6000
        ${gpu_snapshot_id_line}
  userData: |
    [settings.container-runtime]
    snapshotter = "soci"
    # Bare SOCI lazy-loading (no parallel-pull-unpack), matching the GPU pools and
    # the snapshot's baked content store. The head's ray-llm image is pre-baked
    # into the EBS snapshot, so cold-start is ~0s; SOCI is the fallback when the
    # snapshot is stale/absent. PPU is deliberately NOT enabled — it panics the
    # Bottlerocket snapshotter mid-unpack on large multi-GB-layer images.
  tags:
    karpenter.sh/discovery: ${cluster_name}
    Environment: ${environment}
    workload-type: gpu-head
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-head
spec:
  # Higher weight than default so Ray heads land here (with the pre-pulled image),
  # not on the generic default pool (which has no snapshot → slow first start).
  weight: 70
  template:
    metadata:
      labels:
        workload-type: gpu-head
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-head
      # No taint: CPU-only head pods schedule here without a GPU toleration, and
      # nothing else targets workload-type=gpu-head so the pool stays head-only.
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        # General-purpose CPU compute — the head is light (≤1 vCPU, ≤4Gi).
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: [nano, micro, small, medium]
  disruption:
    # Match the GPU pools: don't disrupt a head node while it's hosting a head
    # (the head pod also carries karpenter.sh/do-not-disrupt). Reclaim when empty.
    consolidationPolicy: WhenEmpty
    consolidateAfter: 300s
    budgets:
      - nodes: "1"
