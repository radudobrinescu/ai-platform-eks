# NVIDIA GPU Operator Helm Values
# Chart: nvidia/gpu-operator
# Repository: https://helm.ngc.nvidia.com/nvidia
#
# EKS Bottlerocket NVIDIA AMIs pre-include the driver, toolkit, and device plugin.
# All three must be disabled per AWS docs:
# https://docs.aws.amazon.com/eks/latest/userguide/ml-eks-optimized-ami.html

driver:
  enabled: false

toolkit:
  enabled: false

devicePlugin:
  enabled: false

dcgmExporter:
  enabled: true

nfd:
  enabled: true

operator:
  defaultRuntime: containerd
