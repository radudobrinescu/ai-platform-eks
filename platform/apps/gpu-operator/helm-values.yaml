# NVIDIA GPU Operator Helm Values
# Chart: nvidia/gpu-operator
# Repository: https://helm.ngc.nvidia.com/nvidia
#
# EKS GPU AMIs have NVIDIA drivers pre-installed — driver install disabled.

driver:
  enabled: false

toolkit:
  enabled: true
  installDir: /run/nvidia/toolkit
  env:
    - name: ROOT
      value: /run/nvidia/toolkit

devicePlugin:
  enabled: true

dcgmExporter:
  enabled: true

nfd:
  enabled: true

operator:
  defaultRuntime: containerd
