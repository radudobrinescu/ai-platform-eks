---
# Negative-priority class used by the gpu-shared warm-pool placeholder.
# Real InferenceEndpoint workers have priority 0 (the cluster default), so they
# preempt these pods the moment they need the GPU slice. The placeholder keeps
# Karpenter from consolidating the warm node in the meantime.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gpu-warmup-placeholder
value: -100
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: |
  Lowest-priority class for gpu-shared warm-pool pods. Any real workload
  requesting nvidia.com/gpu at priority >= 0 evicts these instantly.
---
# Keeps one single-GPU NVIDIA G-family node (cheapest = g6.xlarge) continuously
# warm in the gpu-shared NodePool. A pod running here means:
#   * Karpenter has already provisioned the node (~90 s saved)
#   * Bottlerocket + kubelet have booted (~30 s saved)
#   * The Ray LLM image has been pulled once (~100 s saved)
#
# When a developer deploys `shared: true` InferenceEndpoint, its pod
# preempts the placeholder. Since the node is already warm and the
# container image is cached, only the model weights need to be fetched
# (S3 → local in ~15 s if cached, HF → local in ~60 s if not).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-shared-warmup
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-platform
    app.kubernetes.io/component: warm-pool
  annotations:
    ai-platform/purpose: |
      Keeps one g6.xlarge node (or similar) always warm in the
      gpu-shared NodePool. Scale replicas to 0 to disable.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-shared-warmup
  template:
    metadata:
      labels:
        app: gpu-shared-warmup
    spec:
      priorityClassName: gpu-warmup-placeholder
      terminationGracePeriodSeconds: 0
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        workload-type: gpu-shared
      # Match the VRAM floor emitted by recommend-instance.py (minVramPerGpuGiB=21).
      # Without this, Karpenter picks the cheapest eligible instance (T4 16 GiB);
      # real InferenceEndpoint pods with VRAM guards then can't preempt the
      # placeholder, and Karpenter ends up provisioning a second L4 node anyway —
      # the warm-pool saves nothing. Pinning to L4-class (Gt 21503 MiB) costs
      # ~\$200/month more but actually delivers the "skip Karpenter provisioning"
      # win for demo-shaped workloads.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.k8s.aws/instance-gpu-memory
                    operator: Gt
                    values:
                      - "21503"   # (21 GiB * 1024) - 1 — excludes T4, allows L4/A10G/L40S/+
      containers:
        # Using the Ray LLM image (not registry.k8s.io/pause) means the 13 GB
        # image gets pulled onto this warm node exactly once, on provision.
        # The KRO InferenceEndpoint template schedules the Ray HEAD pod onto
        # gpu-shared nodes (this one); when it lands here, the image is
        # already present → kubelet reports "Container image already present
        # on machine" → pod starts in <5 s instead of the usual ~7 min pull
        # on a fresh small-instance node.
        #
        # IMPORTANT: the image reference is cluster-specific (ECR account ID +
        # region). When bumping the Ray LLM tag, update:
        #   1. terraform/30.eks/30.cluster/locals.tf  (ray_image_tag)
        #   2. this file                              (image:)
        # platform-config ConfigMap is derived from #1; this manifest is not.
        - name: warmer
          image: 802019299867.dkr.ecr.eu-central-1.amazonaws.com/docker-hub/anyscale/ray-llm:2.54.0-py311-cu128
          command: ["sh", "-c", "exec sleep infinity"]
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "100m"
              memory: "256Mi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "500m"
              memory: "1Gi"
