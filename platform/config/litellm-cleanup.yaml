# Hourly reconciler for LiteLLM state that has no event-driven owner:
#   - orphaned teams (from deleted AITeams)
#   - completed `-register` Jobs (GC)
# Model deregistration is handled separately, event-driven, by the
# `litellm-sync` controller (platform/services/litellm-sync) — this CronJob
# no longer touches models.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-model-cleanup
  namespace: inference
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: litellm-cleanup
          containers:
            - name: cleanup
              image: curlimages/curl:8.12.1
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  LITELLM="http://litellm.ai-platform.svc.cluster.local:4000"
                  K8S="https://kubernetes.default.svc"
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

                  # NOTE: model deregistration is NOT handled here. The
                  # `litellm-sync` controller (platform/services/litellm-sync)
                  # owns model consistency — it deregisters a model the moment
                  # its InferenceEndpoint is deleted, via a finalizer. This
                  # CronJob now only reconciles teams and GCs register Jobs.

                  # Clean up orphaned teams from LiteLLM
                  TEAMS=$(curl -sf "$LITELLM/team/list" \
                    -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
                    | sed -n 's/.*"team_alias":"\([^"]*\)".*"team_id":"\([^"]*\)".*/\1 \2/gp')
                  AITEAMS=$(curl -sf --cacert "$CA" \
                    -H "Authorization: Bearer $SA_TOKEN" \
                    "$K8S/apis/kro.run/v1alpha1/namespaces/ai-platform/aiteams" \
                    | sed -n 's/.*"teamName":"\([^"]*\)".*/\1/gp' | sort -u)
                  echo "$TEAMS" | while read -r alias tid; do
                    [ -z "$alias" ] && continue
                    if ! echo "$AITEAMS" | grep -qx "$alias"; then
                      echo "Orphaned team: $alias — deregistering"
                      curl -sf -X POST "$LITELLM/team/delete" \
                        -H "Content-Type: application/json" \
                        -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
                        -d "{\"team_ids\":[\"$tid\"]}" \
                        && echo "  Deleted team $alias"
                    fi
                  done

                  # Clean up completed registration Jobs
                  JOBS=$(curl -sf --cacert "$CA" \
                    -H "Authorization: Bearer $SA_TOKEN" \
                    "$K8S/apis/batch/v1/namespaces/inference/jobs?labelSelector=job-name" \
                    | sed -n 's/.*"name":"\([^"]*-register[^"]*\)".*/\1/gp' | sort -u)
                  for job in $JOBS; do
                    STATUS=$(curl -sf --cacert "$CA" \
                      -H "Authorization: Bearer $SA_TOKEN" \
                      "$K8S/apis/batch/v1/namespaces/inference/jobs/$job" \
                      | sed -n 's/.*"complete".*"status":"True".*/complete/p')
                    if [ "$STATUS" = "complete" ]; then
                      curl -sf --cacert "$CA" \
                        -H "Authorization: Bearer $SA_TOKEN" \
                        -X DELETE "$K8S/apis/batch/v1/namespaces/inference/jobs/$job?propagationPolicy=Background" \
                        && echo "  Cleaned job: $job"
                    fi
                  done
                  echo "Done."
              env:
                - name: LITELLM_MASTER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-api-key
                      key: master-key
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "100m"
                  memory: "64Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-cleanup
  namespace: inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litellm-cleanup
rules:
  - apiGroups: ["kro.run"]
    resources: ["aiteams"]
    verbs: ["list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: litellm-cleanup
subjects:
  - kind: ServiceAccount
    name: litellm-cleanup
    namespace: inference
roleRef:
  kind: ClusterRole
  name: litellm-cleanup
  apiGroup: rbac.authorization.k8s.io
