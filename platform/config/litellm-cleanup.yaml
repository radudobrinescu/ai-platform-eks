# Hourly reconciler for the one bit of LiteLLM state with no event-driven owner:
#   - orphaned teams (from deleted AITeams)
# Model registration AND deregistration are handled event-driven by the
# `litellm-sync` controller (platform/services/litellm-sync) — this CronJob
# never touches models.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-model-cleanup
  namespace: inference
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: litellm-cleanup
          containers:
            - name: cleanup
              image: curlimages/curl:8.12.1
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  LITELLM="http://litellm.ai-platform.svc.cluster.local:4000"
                  K8S="https://kubernetes.default.svc"
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

                  # NOTE: models are NOT handled here. The `litellm-sync`
                  # controller (platform/services/litellm-sync) owns the model
                  # registry — it registers on create and deregisters on delete
                  # (finalizer) across all serving tiers. This CronJob only
                  # reconciles orphaned teams.

                  # Clean up orphaned teams from LiteLLM
                  TEAMS=$(curl -sf "$LITELLM/team/list" \
                    -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
                    | sed -n 's/.*"team_alias":"\([^"]*\)".*"team_id":"\([^"]*\)".*/\1 \2/gp')
                  AITEAMS=$(curl -sf --cacert "$CA" \
                    -H "Authorization: Bearer $SA_TOKEN" \
                    "$K8S/apis/kro.run/v1alpha1/namespaces/ai-platform/aiteams" \
                    | sed -n 's/.*"teamName":"\([^"]*\)".*/\1/gp' | sort -u)
                  echo "$TEAMS" | while read -r alias tid; do
                    [ -z "$alias" ] && continue
                    if ! echo "$AITEAMS" | grep -qx "$alias"; then
                      echo "Orphaned team: $alias — deregistering"
                      curl -sf -X POST "$LITELLM/team/delete" \
                        -H "Content-Type: application/json" \
                        -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
                        -d "{\"team_ids\":[\"$tid\"]}" \
                        && echo "  Deleted team $alias"
                    fi
                  done

                  echo "Done."
              env:
                - name: LITELLM_MASTER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-api-key
                      key: master-key
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "100m"
                  memory: "64Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-cleanup
  namespace: inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litellm-cleanup
rules:
  - apiGroups: ["kro.run"]
    resources: ["aiteams"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: litellm-cleanup
subjects:
  - kind: ServiceAccount
    name: litellm-cleanup
    namespace: inference
roleRef:
  kind: ClusterRole
  name: litellm-cleanup
  apiGroup: rbac.authorization.k8s.io
