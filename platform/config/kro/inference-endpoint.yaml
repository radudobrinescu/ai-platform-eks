apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: inference-endpoint
spec:
  schema:
    apiVersion: v1alpha1
    kind: InferenceEndpoint
    spec:
      model:                "string"                    # HuggingFace model ID (e.g. google/gemma-3-4b-it)
      gpuCount:             "integer | default=1"       # Total GPUs per worker (must equal tensorParallelSize × pipelineParallelSize)
      tensorParallelSize:   "integer | default=0"       # TP degree — splits layers across GPUs (0 = use gpuCount, backward-compat)
      pipelineParallelSize: "integer | default=1"       # PP degree — splits layer groups across GPUs (prefer on PCIe/non-NVLink)
      shared:               "boolean | default=false"   # Use GPU time-slicing (shared GPU node pool)
      minReplicas:          "integer | default=1"       # Min Ray Serve replicas
      maxReplicas:          "integer | default=4"       # Max Ray Serve replicas
      workerMemory:         "string  | default=12Gi"    # Memory per GPU worker (default fits 3B models; larger models should override via the recommender)
      workerCpu:            "string  | default=4"       # CPU per GPU worker
      maxModelLen:          "integer | default=8192"    # Max sequence length
      minVramPerGpuGiB:     "integer | default=0"       # Min per-GPU VRAM in GiB (Karpenter hint; 0 = no constraint)
      rayImage:             "string  | default=anyscale/ray-llm:2.54.0-py311-cu128"
    status:
      # Ready=True only when Ray Serve has an ACTIVE application at 'RUNNING'
      # AND nothing pending. During a rollout, KubeRay keeps the old active
      # spec serving (possibly with terminating replicas) while a new spec
      # goes through DEPLOYING in pendingServiceStatus — requests during that
      # window can fail with "Connection error" even though active looks
      # healthy. Treating the combination (active=RUNNING AND pending=empty)
      # as the only 'Ready' state eliminates that false-positive window.
      ready:            "${rayservice.status.?activeServiceStatus.?applicationStatuses.?llm.?status.orValue('') == 'RUNNING' && rayservice.status.?pendingServiceStatus.?applicationStatuses.?llm.?status.orValue('') == '' ? 'True' : 'False'}"
      modelStatus:      "${rayservice.status.?activeServiceStatus.?applicationStatuses.?llm.?status.orValue(rayservice.status.?pendingServiceStatus.?applicationStatuses.?llm.?status.orValue('Pending'))}"
      endpoint:         "${rayservice.metadata.name}-serve-svc.${rayservice.metadata.namespace}.svc.cluster.local:8000"
      message:          "${rayservice.status.?activeServiceStatus.?applicationStatuses.?llm.?status.orValue('') == 'RUNNING' && rayservice.status.?pendingServiceStatus.?applicationStatuses.?llm.?status.orValue('') == '' ? 'Model is live and serving requests' : (rayservice.status.?pendingServiceStatus.?applicationStatuses.?llm.?status.orValue('') == 'RUNNING' ? 'Model rollout finishing' : (rayservice.status.?pendingServiceStatus.?applicationStatuses.?llm.?status.orValue('') == 'DEPLOYING' || rayservice.status.?activeServiceStatus.?applicationStatuses.?llm.?status.orValue('') == 'DEPLOYING' ? 'Model is loading onto GPU workers' : 'Waiting for GPU node provisioning and image pull'))}"

  resources:
    # --- Platform config (created by Terraform) ---
    # Provides ECR image URI. Falls back to schema defaults if ConfigMap doesn't exist.
    - id: platformConfig
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: platform-config

    # --- Validate and register model with LiteLLM via API ---
    - id: litellmregister
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-register
        spec:
          backoffLimit: 10
          ttlSecondsAfterFinished: 300
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: register
                  image: curlimages/curl:8.12.1
                  command: ["sh", "-c"]
                  args:
                    - |
                      # --- Validate gpuCount is a power of 2 (vLLM tensor parallelism requirement) ---
                      case "$GPU_COUNT" in
                        1|2|4|8) ;;
                        *) echo "ERROR: gpuCount=$GPU_COUNT is invalid. Must be 1, 2, 4, or 8."; exit 1 ;;
                      esac

                      # --- Validate TP × PP = gpuCount when TP is explicitly set ---
                      if [ "$TP_SIZE" -gt 0 ]; then
                        EXPECTED=$((TP_SIZE * PP_SIZE))
                        if [ "$EXPECTED" -ne "$GPU_COUNT" ]; then
                          echo "ERROR: tensorParallelSize($TP_SIZE) × pipelineParallelSize($PP_SIZE) = $EXPECTED, but gpuCount=$GPU_COUNT. They must match."
                          exit 1
                        fi
                      fi

                      # --- Validate model exists on HuggingFace ---
                      echo "Checking model $MODEL_ID on HuggingFace..."
                      HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "https://huggingface.co/api/models/$MODEL_ID")
                      if [ "$HTTP_CODE" = "404" ]; then
                        echo "ERROR: Model '$MODEL_ID' not found on HuggingFace. Check the model ID."
                        exit 1
                      elif [ "$HTTP_CODE" != "200" ]; then
                        echo "WARNING: Could not verify model on HuggingFace (HTTP $HTTP_CODE). Proceeding anyway."
                      else
                        echo "✓ Model verified on HuggingFace"
                      fi

                      # --- Wait for LiteLLM and register ---
                      until curl -sf http://litellm.ai-platform.svc.cluster.local:4000/health/liveliness; do
                        echo "Waiting for LiteLLM..."; sleep 5
                      done
                      if curl -sf http://litellm.ai-platform.svc.cluster.local:4000/v1/models \
                        -H "Authorization: Bearer $LITELLM_MASTER_KEY" | grep -q "\"id\":\"$MODEL_NAME\""; then
                        echo "Model $MODEL_NAME already registered. Skipping."
                      else
                        curl -sf -X POST http://litellm.ai-platform.svc.cluster.local:4000/model/new \
                          -H "Content-Type: application/json" \
                          -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
                          -d "{\"model_name\":\"$MODEL_NAME\",\"litellm_params\":{\"model\":\"openai/$MODEL_ID\",\"api_base\":\"http://$MODEL_NAME-serve-svc.$NAMESPACE.svc.cluster.local:8000/v1\",\"api_key\":\"no-key\"}}" \
                        && echo "✓ Model registered with LiteLLM"
                      fi
                  env:
                    - name: LITELLM_MASTER_KEY
                      valueFrom:
                        secretKeyRef:
                          name: litellm-api-key
                          key: master-key
                    - name: MODEL_NAME
                      value: ${schema.metadata.name}
                    - name: MODEL_ID
                      value: ${schema.spec.model}
                    - name: NAMESPACE
                      value: ${schema.metadata.namespace}
                    - name: GPU_COUNT
                      value: ${string(schema.spec.gpuCount)}
                    - name: TP_SIZE
                      value: ${string(schema.spec.tensorParallelSize)}
                    - name: PP_SIZE
                      value: ${string(schema.spec.pipelineParallelSize)}

    # --- RayService with vLLM backend ---
    - id: rayservice
      template:
        apiVersion: ray.io/v1
        kind: RayService
        metadata:
          name: ${schema.metadata.name}
        spec:
          serviceUnhealthySecondThreshold: 1800
          deploymentUnhealthySecondThreshold: 1800
          serveConfigV2: |
            applications:
              - name: llm
                import_path: ray.serve.llm:build_openai_app
                args:
                  llm_configs:
                    - model_loading_config:
                        model_id: ${schema.spec.model}
                      engine_kwargs:
                        dtype: bfloat16
                        max_model_len: ${string(schema.spec.maxModelLen)}
                        gpu_memory_utilization: 0.9
                        tensor_parallel_size: ${string(schema.spec.tensorParallelSize > 0 ? schema.spec.tensorParallelSize : schema.spec.gpuCount)}
                        pipeline_parallel_size: ${string(schema.spec.pipelineParallelSize)}
                      deployment_config:
                        autoscaling_config:
                          min_replicas: ${string(schema.spec.minReplicas)}
                          max_replicas: ${string(schema.spec.maxReplicas)}
                          target_ongoing_requests: 10
          rayClusterConfig:
            rayVersion: "2.54.0"
            enableInTreeAutoscaling: true
            headGroupSpec:
              rayStartParams:
                dashboard-host: "0.0.0.0"
                num-cpus: "0"
              template:
                metadata:
                  annotations:
                    # Prevent Karpenter from disrupting nodes while a model is serving.
                    # Nodes are still reclaimed when empty (see gpu-*.yaml NodePools,
                    # consolidationPolicy: WhenEmpty).
                    karpenter.sh/do-not-disrupt: "true"
                spec:
                  # Place the Ray head on gpu-shared pool so it lands on the
                  # warm-pool node where the Ray LLM image is pre-pulled.
                  # The head doesn't request GPU, so it schedules alongside
                  # the worker (which preempts the placeholder for its GPU
                  # slice). Result: head container starts in <5 s instead of
                  # ~7 min of image pull on a fresh default-pool instance.
                  nodeSelector:
                    kubernetes.io/arch: amd64
                    workload-type: gpu-shared
                  tolerations:
                    - key: nvidia.com/gpu
                      operator: Exists
                      effect: NoSchedule
                  containers:
                    - name: ray-head
                      image: ${platformConfig.data.?rayImage.orValue(schema.spec.rayImage)}
                      ports:
                        - containerPort: 6379
                          name: gcs
                        - containerPort: 8265
                          name: dashboard
                        - containerPort: 10001
                          name: client
                        - containerPort: 8000
                          name: serve
                      resources:
                        requests:
                          cpu: "500m"
                          memory: "2Gi"
                        limits:
                          cpu: "1"
                          memory: "4Gi"
            workerGroupSpecs:
              - groupName: gpu-workers
                replicas: ${schema.spec.minReplicas}
                minReplicas: ${schema.spec.minReplicas}
                maxReplicas: ${schema.spec.maxReplicas}
                rayStartParams: {}
                template:
                  metadata:
                    annotations:
                      # Same rationale as the head: keep Karpenter from consolidating a node
                      # hosting a serving model. Empty nodes are still reclaimed.
                      karpenter.sh/do-not-disrupt: "true"
                  spec:
                    # ServiceAccount with IRSA annotation (Terraform-managed)
                    # grants s3:GetObject / s3:PutObject on the model-cache bucket.
                    # Default fallback "default" keeps RayServices renderable on
                    # clusters where Terraform hasn't created the SA yet.
                    serviceAccountName: "inference-worker"
                    tolerations:
                      - key: nvidia.com/gpu
                        operator: Exists
                        effect: NoSchedule
                    nodeSelector:
                      workload-type: "${schema.spec.shared ? 'gpu-shared' : 'gpu-inference'}"
                    # Force Karpenter to pick a GPU node that actually has enough per-GPU VRAM.
                    # Without this, Karpenter optimises for cheapest-fit and may land on a T4
                    # (16 GiB) when the model needs L4 (24) or L40S (48). The Karpenter label
                    # reports *schedulable* VRAM after ECC/driver reservation, so the recommender
                    # emits a conservative minVramPerGpuGiB that compares safely with `Gt`.
                    affinity:
                      nodeAffinity:
                        requiredDuringSchedulingIgnoredDuringExecution:
                          nodeSelectorTerms:
                            - matchExpressions:
                                - key: karpenter.k8s.aws/instance-gpu-memory
                                  operator: Gt
                                  values:
                                    - "${string(schema.spec.minVramPerGpuGiB > 0 ? (schema.spec.minVramPerGpuGiB * 1024) - 1 : 0)}"
                    # --- Weights cache ---------------------------------------
                    # initContainer: sync pre-populated HF cache from S3 if it
                    # exists. On cache miss, vLLM will download from HF at
                    # runtime — fully backwards-compatible, no regression.
                    initContainers:
                      - name: hf-cache-download
                        image: peakcom/s5cmd:v2.3.0
                        env:
                          - name: MODEL_ID
                            value: ${schema.spec.model}
                          - name: CACHE_BUCKET
                            value: ${platformConfig.data.?modelCacheBucket.orValue("")}
                          - name: AWS_REGION
                            value: ${platformConfig.data.?region.orValue("us-east-1")}
                        command:
                          - sh
                          - -c
                          - |
                            set -u
                            if [ -z "$CACHE_BUCKET" ]; then
                              echo "modelCacheBucket not configured — vLLM will download from HF at runtime."
                              exit 0
                            fi
                            PREFIX="hf/$MODEL_ID"
                            LOCAL="/hf-cache/hub/models--$(echo "$MODEL_ID" | sed 's#/#--#g')"
                            echo "Probing s3://$CACHE_BUCKET/$PREFIX/ ..."
                            if /s5cmd ls "s3://$CACHE_BUCKET/$PREFIX/" >/dev/null 2>&1; then
                              echo "Cache hit — syncing to $LOCAL"
                              mkdir -p "$LOCAL"
                              if /s5cmd sync "s3://$CACHE_BUCKET/$PREFIX/*" "$LOCAL/"; then
                                echo "Cache populated from S3 in $(date -u +%T)"
                              else
                                echo "Partial sync — wiping local cache so vLLM falls back to HF."
                                rm -rf "$LOCAL"
                              fi
                            else
                              echo "Cache miss for $MODEL_ID — vLLM will download from HF."
                              echo "  (A sidecar will auto-warm the cache after vLLM finishes loading.)"
                            fi
                            # Ensure the worker pod's `ray` user (uid 1000)
                            # can write into /hf-cache/hub on cache miss. The
                            # init container runs as root, so any directories
                            # we create here inherit root ownership; we must
                            # explicitly create AND chmod the full hub path
                            # regardless of cache hit/miss order.
                            mkdir -p /hf-cache/hub/.locks
                            chmod -R a+rwX /hf-cache
                        volumeMounts:
                          - name: hf-cache
                            mountPath: /hf-cache
                    containers:
                      - name: ray-worker
                        image: ${platformConfig.data.?rayImage.orValue(schema.spec.rayImage)}
                        env:
                          - name: HF_TOKEN
                            valueFrom:
                              secretKeyRef:
                                name: hf-token
                                key: token
                                optional: true
                          - name: HF_HOME
                            value: /hf-cache
                          - name: HF_HUB_ENABLE_HF_TRANSFER
                            value: "1"
                        resources:
                          requests:
                            cpu: ${schema.spec.workerCpu}
                            memory: ${schema.spec.workerMemory}
                            nvidia.com/gpu: ${schema.spec.gpuCount}
                          limits:
                            cpu: ${schema.spec.workerCpu}
                            memory: ${schema.spec.workerMemory}
                            nvidia.com/gpu: ${schema.spec.gpuCount}
                        volumeMounts:
                          - name: hf-cache
                            mountPath: /hf-cache
                      # --- Auto-warm sidecar -------------------------------
                      # Uploads the local HF cache to S3 a few minutes after
                      # vLLM has finished loading, so the next deploy of this
                      # model hits the cache. No-op if the bucket already has
                      # the model or if the Ray worker never finished loading.
                      - name: hf-cache-uploader
                        image: peakcom/s5cmd:v2.3.0
                        env:
                          - name: MODEL_ID
                            value: ${schema.spec.model}
                          - name: CACHE_BUCKET
                            value: ${platformConfig.data.?modelCacheBucket.orValue("")}
                          - name: AWS_REGION
                            value: ${platformConfig.data.?region.orValue("us-east-1")}
                        command:
                          - sh
                          - -c
                          - |
                            set -u
                            if [ -z "$CACHE_BUCKET" ]; then
                              echo "modelCacheBucket not configured — uploader idle."
                              exec tail -f /dev/null
                            fi
                            sleep 300  # let vLLM finish loading before we inspect the cache
                            PREFIX="hf/$MODEL_ID"
                            LOCAL="/hf-cache/hub/models--$(echo "$MODEL_ID" | sed 's#/#--#g')"
                            if /s5cmd ls "s3://$CACHE_BUCKET/$PREFIX/" >/dev/null 2>&1; then
                              echo "S3 cache already populated for $MODEL_ID — nothing to do."
                            elif [ -d "$LOCAL" ] && [ -n "$(ls -A "$LOCAL" 2>/dev/null)" ]; then
                              echo "Uploading $MODEL_ID to s3://$CACHE_BUCKET/$PREFIX/ ..."
                              /s5cmd sync "$LOCAL/" "s3://$CACHE_BUCKET/$PREFIX/" \
                                && echo "Cache warmed." || echo "Upload failed; cache not warmed."
                            else
                              echo "Local cache empty — vLLM likely failed to load; skip upload."
                            fi
                            exec tail -f /dev/null
                        resources:
                          requests:
                            cpu: "50m"
                            memory: "128Mi"
                          limits:
                            cpu: "500m"
                            memory: "512Mi"
                        volumeMounts:
                          - name: hf-cache
                            mountPath: /hf-cache
                            readOnly: true
                    volumes:
                      - name: hf-cache
                        emptyDir:
                          sizeLimit: 100Gi

    # --- CloudWatch Log Group (via ACK) ---
    - id: loggroup
      template:
        apiVersion: cloudwatchlogs.services.k8s.aws/v1alpha1
        kind: LogGroup
        metadata:
          name: ${schema.metadata.name}-logs
        spec:
          name: /ai-platform/models/${schema.metadata.name}
          retentionDays: 30
          tags:
            ai-platform/model: ${schema.metadata.name}
            ai-platform/managed-by: kro
