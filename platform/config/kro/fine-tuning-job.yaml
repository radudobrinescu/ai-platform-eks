apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: fine-tuning-job
spec:
  schema:
    apiVersion: v1alpha1
    kind: FineTuneJob
    spec:
      # === Required ===
      baseModel: "string | default=unsloth/Qwen2.5-3B-Instruct-bnb-4bit"  # Unsloth pre-quant or HF model; default = the platform's showcase base
      dataset:   "string"                              # s3://bucket/key.jsonl  OR  HuggingFace:org/dataset

      # === Training hyperparameters ===
      method:               'string  | default=qlora enum="qlora,lora,full"'   # enforced by CRD schema
      loraRank:             'integer | default=16 enum="8,16,32,64,128"'
      loraAlpha:            "integer | default=16"
      learningRate:         "string  | default=2e-4"
      epochs:               "integer | default=1"
      batchSize:            "integer | default=2"
      gradientAccumulation: "integer | default=4"
      maxSeqLength:         "integer | default=2048"
      datasetFormat:        'string  | default=auto enum="auto,alpaca,sharegpt,chatml,completion,raw"'

      # === Resources ===
      gpuCount:         "integer | default=1 minimum=1 maximum=1"  # V1 supports 1 (enforced by CRD schema)
      workerMemory:     "string  | default=16Gi"
      workerCpu:        "string  | default=4"
      minVramPerGpuGiB: "integer | default=16"
      timeoutHours:     "integer | default=6"
      shared:           "boolean | default=false"        # time-sliced GPU pool

      # === Output ===
      outputFormat: "string  | default=safetensors"      # safetensors | gguf-q4_k_m | gguf-q8_0 | lora-only
      pushToHub:    "string  | default="                 # optional HF repo to also push to
      autoDeploy:   "boolean | default=false"            # create an InferenceEndpoint after training

      # === Optional ===
      wandbProject: "string | default="
      unslothImage: "string | default="                  # override the Terraform-provided trainer image

    status:
      # The training Job is the source of truth for phase.
      # NOTE: KRO status CEL may only reference resource outputs, never the
      # instance `schema` — so we surface the training Job name (which is
      # `<name>-train`) and the model-cache bucket. The full timestamped output
      # prefix (fine-tuned/<name>/<ts>/) is logged by train.py at upload time.
      phase: "${trainingjob.status.?succeeded.orValue(0) > 0 ? 'Completed' : (trainingjob.status.?active.orValue(0) > 0 ? 'Training' : (trainingjob.status.?failed.orValue(0) > 0 ? 'Failed' : 'Pending'))}"
      modelCacheBucket: "${platformconfig.data.?modelCacheBucket.orValue('')}"
      jobName: "${trainingjob.metadata.name}"

  resources:
    # --- Platform config (created by Terraform) ---
    - id: platformconfig
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: platform-config

    # --- ConfigMap holding train.py (mounted into the training container) ---
    - id: trainscript
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name}-trainscript
        data:
          train.py: |
            #!/usr/bin/env python3
            """train.py — fine-tune a model with Unsloth QLoRA, export to S3,
            and optionally auto-deploy as an InferenceEndpoint.

            All config comes from environment variables (injected by KRO). No CLI
            args — simpler to wire from the RGD, harder to hardcode by accident.
            """
            import os
            import subprocess
            import sys
            import time


            def env(name, default=None, required=False):
                v = os.environ.get(name, default)
                if required and (v is None or v == ""):
                    sys.exit(f"FATAL: env {name} is required")
                return v


            BASE_MODEL = env("BASE_MODEL", required=True)
            DATASET = env("DATASET", required=True)
            METHOD = env("METHOD", "qlora")
            LORA_RANK = int(env("LORA_RANK", "16"))
            LORA_ALPHA = int(env("LORA_ALPHA", "16"))
            LEARNING_RATE = float(env("LEARNING_RATE", "2e-4"))
            EPOCHS = int(env("EPOCHS", "1"))
            BATCH_SIZE = int(env("BATCH_SIZE", "2"))
            GRAD_ACCUM = int(env("GRAD_ACCUM", "4"))
            MAX_SEQ_LEN = int(env("MAX_SEQ_LEN", "2048"))
            DATASET_FORMAT = env("DATASET_FORMAT", "auto")
            OUTPUT_FORMAT = env("OUTPUT_FORMAT", "safetensors")
            OUTPUT_DIR = env("OUTPUT_DIR", "/workspace/output")
            CACHE_BUCKET = env("CACHE_BUCKET", required=True)
            JOB_NAME = env("JOB_NAME", required=True)
            NAMESPACE = env("NAMESPACE", "inference")
            AUTO_DEPLOY = env("AUTO_DEPLOY", "false").lower() == "true"
            PUSH_TO_HUB = env("PUSH_TO_HUB", "")
            WANDB_PROJECT = env("WANDB_PROJECT", "")
            TIMESTAMP = time.strftime("%Y%m%dT%H%M%SZ", time.gmtime())

            # 1. Resolve dataset (S3 → local file, or HF dataset id) -------------
            local_dataset_dir = "/workspace/dataset"
            os.makedirs(local_dataset_dir, exist_ok=True)
            if DATASET.startswith("s3://"):
                print(f"Syncing dataset from {DATASET}", flush=True)
                dataset_path = f"{local_dataset_dir}/data.jsonl"
                subprocess.check_call(["s5cmd", "cp", DATASET, dataset_path])
            elif DATASET.startswith("HuggingFace:"):
                dataset_path = DATASET[len("HuggingFace:"):]
            else:
                sys.exit(f"FATAL: dataset must be 's3://...' or 'HuggingFace:org/dataset', got: {DATASET}")

            # 2. W&B (must be configured before importing unsloth) ---------------
            if WANDB_PROJECT:
                os.environ["WANDB_PROJECT"] = WANDB_PROJECT
                os.environ["WANDB_LOG_MODEL"] = "false"  # we upload to S3 ourselves
            else:
                os.environ["WANDB_DISABLED"] = "true"


            def detect_format(cols):
                if {"instruction", "output"}.issubset(cols):
                    return "alpaca"
                if "conversations" in cols:
                    return "sharegpt"
                if "messages" in cols:
                    return "chatml"
                if {"prompt", "completion"}.issubset(cols):
                    return "completion"
                if cols == {"text"}:
                    return "raw"
                sys.exit(f"FATAL: cannot detect dataset format from columns {cols}; set datasetFormat explicitly")


            def format_dataset(ds, tokenizer, override="auto"):
                cols = set(ds.column_names)
                fmt = override if override != "auto" else detect_format(cols)
                print(f"Dataset format: {fmt} (columns={cols})", flush=True)
                if fmt == "alpaca":
                    def _alpaca(row):
                        inp = row.get("input") or ""
                        prompt = (
                            f"### Instruction:\n{row['instruction']}\n"
                            + (f"### Input:\n{inp}\n" if inp else "")
                            + f"### Response:\n{row['output']}"
                        )
                        return {"text": prompt}
                    return ds.map(_alpaca, remove_columns=ds.column_names)
                if fmt in ("sharegpt", "chatml"):
                    key = "conversations" if fmt == "sharegpt" else "messages"
                    def _apply(row):
                        return {"text": tokenizer.apply_chat_template(row[key], tokenize=False)}
                    return ds.map(_apply, remove_columns=ds.column_names)
                if fmt == "completion":
                    return ds.map(
                        lambda r: {"text": r["prompt"] + r["completion"]},
                        remove_columns=ds.column_names,
                    )
                if fmt == "raw":
                    return ds
                sys.exit(f"FATAL: unsupported datasetFormat: {fmt}")


            # 3. Train -----------------------------------------------------------
            from unsloth import FastLanguageModel, is_bfloat16_supported
            from trl import SFTTrainer
            from transformers import TrainingArguments
            from datasets import load_dataset

            load_in_4bit = METHOD == "qlora"
            model, tokenizer = FastLanguageModel.from_pretrained(
                model_name=BASE_MODEL,
                max_seq_length=MAX_SEQ_LEN,
                dtype=None,
                load_in_4bit=load_in_4bit,
            )

            if METHOD in ("qlora", "lora"):
                model = FastLanguageModel.get_peft_model(
                    model,
                    r=LORA_RANK,
                    target_modules=[
                        "q_proj", "k_proj", "v_proj", "o_proj",
                        "gate_proj", "up_proj", "down_proj",
                    ],
                    lora_alpha=LORA_ALPHA,
                    lora_dropout=0,
                    bias="none",
                    use_gradient_checkpointing="unsloth",
                    random_state=3407,
                )

            if dataset_path.startswith("/"):
                ds = load_dataset("json", data_files=dataset_path, split="train")
            else:
                ds = load_dataset(dataset_path, split="train")
            ds = format_dataset(ds, tokenizer, override=DATASET_FORMAT)

            trainer = SFTTrainer(
                model=model,
                tokenizer=tokenizer,
                train_dataset=ds,
                dataset_text_field="text",
                max_seq_length=MAX_SEQ_LEN,
                args=TrainingArguments(
                    per_device_train_batch_size=BATCH_SIZE,
                    gradient_accumulation_steps=GRAD_ACCUM,
                    num_train_epochs=EPOCHS,
                    learning_rate=LEARNING_RATE,
                    weight_decay=0.01,
                    warmup_steps=5,
                    lr_scheduler_type="linear",
                    output_dir=OUTPUT_DIR,
                    logging_steps=10,
                    save_strategy="no",
                    bf16=is_bfloat16_supported(),
                    fp16=not is_bfloat16_supported(),
                    report_to=["wandb"] if WANDB_PROJECT else [],
                    seed=3407,
                ),
            )
            trainer.train()

            # 4. Export ----------------------------------------------------------
            merged_dir = f"{OUTPUT_DIR}/merged"
            os.makedirs(merged_dir, exist_ok=True)
            if OUTPUT_FORMAT == "safetensors":
                model.save_pretrained_merged(merged_dir, tokenizer, save_method="merged_16bit")
            elif OUTPUT_FORMAT.startswith("gguf-"):
                quant = OUTPUT_FORMAT[len("gguf-"):]
                model.save_pretrained_gguf(merged_dir, tokenizer, quantization_method=quant)
            elif OUTPUT_FORMAT == "lora-only":
                model.save_pretrained(merged_dir)
                tokenizer.save_pretrained(merged_dir)
            else:
                sys.exit(f"FATAL: unknown outputFormat: {OUTPUT_FORMAT}")

            if PUSH_TO_HUB:
                print(f"Pushing to HuggingFace Hub: {PUSH_TO_HUB}", flush=True)
                model.push_to_hub_merged(PUSH_TO_HUB, tokenizer, save_method="merged_16bit")

            # 5. Upload to S3 ----------------------------------------------------
            s3_prefix = f"s3://{CACHE_BUCKET}/fine-tuned/{JOB_NAME}/{TIMESTAMP}/"
            print(f"Uploading {merged_dir}/ to {s3_prefix}", flush=True)
            subprocess.check_call(["s5cmd", "sync", f"{merged_dir}/", s3_prefix])

            # 6. autoDeploy ------------------------------------------------------
            # Create the InferenceEndpoint only now that weights exist in S3, so
            # its modelSource init-container syncs a populated prefix (the v2 plan's
            # Job-creates-endpoint pattern — KRO can't gate sub-resource creation
            # on Job completion).
            if AUTO_DEPLOY:
                import textwrap
                endpoint_yaml = textwrap.dedent(f"""\
                    apiVersion: kro.run/v1alpha1
                    kind: InferenceEndpoint
                    metadata:
                      name: {JOB_NAME}
                      namespace: {NAMESPACE}
                      labels:
                        ai-platform/source: fine-tuning
                        ai-platform/finetune-job: {JOB_NAME}
                    spec:
                      model: {JOB_NAME}
                      modelSource: fine-tuned/{JOB_NAME}/{TIMESTAMP}/
                      gpuCount: 1
                      minReplicas: 1
                      maxReplicas: 1
                      workerMemory: "16Gi"
                      minVramPerGpuGiB: 16
                """)
                with open("/tmp/endpoint.yaml", "w") as fh:
                    fh.write(endpoint_yaml)
                subprocess.check_call(["kubectl", "apply", "-f", "/tmp/endpoint.yaml"])
                print(f"Created InferenceEndpoint {JOB_NAME}", flush=True)

            print(f"Fine-tuning complete. Model at {s3_prefix}", flush=True)

    # --- Validation Job (cheap, runs first; gates the GPU Job) ---
    - id: validationjob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-validate
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              serviceAccountName: fine-tuning-worker
              containers:
                - name: validate
                  image: amazon/aws-cli:2.17.30
                  command: ["sh", "-c"]
                  args:
                    - |
                      set -eo pipefail
                      # amazon/aws-cli is Amazon Linux 2023 (dnf, not apk) and
                      # ships without curl. Install it for the HF reachability checks.
                      command -v curl >/dev/null 2>&1 || dnf install -y curl >/dev/null 2>&1 || true
                      echo "Validating baseModel $BASE_MODEL on HuggingFace..."
                      MODEL_HTTP=$(curl -s -o /dev/null -w '%{http_code}' "https://huggingface.co/api/models/$BASE_MODEL")
                      if [ "$MODEL_HTTP" = "404" ]; then
                        echo "ERROR: baseModel '$BASE_MODEL' not found on HuggingFace"; exit 1
                      fi
                      case "$DATASET" in
                        s3://*)
                          aws s3 ls "$DATASET" || { echo "ERROR: dataset $DATASET not accessible"; exit 1; } ;;
                        HuggingFace:*)
                          DS=$(echo "$DATASET" | sed 's/^HuggingFace://')
                          DS_HTTP=$(curl -s -o /dev/null -w '%{http_code}' "https://huggingface.co/api/datasets/$DS")
                          [ "$DS_HTTP" = "200" ] || { echo "ERROR: HF dataset $DS not found"; exit 1; } ;;
                        *)
                          echo "ERROR: dataset must be 's3://...' or 'HuggingFace:org/dataset'"; exit 1 ;;
                      esac
                      # method / loraRank / gpuCount are validated by the CRD
                      # schema (enum + min/max markers) at admission time.
                      echo "Validation passed"
                  env:
                    - name: BASE_MODEL
                      value: ${schema.spec.baseModel}
                    - name: DATASET
                      value: ${schema.spec.dataset}

    # --- Training Job (the heavy lifter) ---
    - id: trainingjob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}-train
          annotations:
            karpenter.sh/do-not-disrupt: "true"
        spec:
          backoffLimit: 2
          activeDeadlineSeconds: ${schema.spec.timeoutHours * 3600}
          template:
            metadata:
              annotations:
                karpenter.sh/do-not-disrupt: "true"
            spec:
              restartPolicy: Never
              serviceAccountName: fine-tuning-worker
              tolerations:
                - key: nvidia.com/gpu
                  operator: Exists
                  effect: NoSchedule
              nodeSelector:
                workload-type: "${schema.spec.shared ? 'gpu-shared' : 'gpu-inference'}"
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: karpenter.k8s.aws/instance-gpu-memory
                            operator: Gt
                            values:
                              - "${string(schema.spec.minVramPerGpuGiB > 0 ? ((schema.spec.minVramPerGpuGiB - 1) * 1024) - 1 : 0)}"
              initContainers:
                # Gate on validation success — no GPU node provisioned if it fails.
                # Reuse the trainer image (bundles kubectl + a shell) so the node
                # pulls a single image; bitnami/kubectl tags were removed from
                # Docker Hub and 404 on pull.
                - name: wait-validation
                  image: "${schema.spec.unslothImage != '' ? schema.spec.unslothImage : platformconfig.data.?unslothImage.orValue('')}"
                  command: ["sh", "-c"]
                  args:
                    - |
                      kubectl wait --for=condition=complete --timeout=10m \
                        job/${schema.metadata.name}-validate -n ${schema.metadata.namespace}
              containers:
                - name: trainer
                  image: "${schema.spec.unslothImage != '' ? schema.spec.unslothImage : platformconfig.data.?unslothImage.orValue('')}"
                  command: ["python", "/scripts/train.py"]
                  env:
                    - name: BASE_MODEL
                      value: ${schema.spec.baseModel}
                    - name: DATASET
                      value: ${schema.spec.dataset}
                    - name: METHOD
                      value: ${schema.spec.method}
                    - name: LORA_RANK
                      value: ${string(schema.spec.loraRank)}
                    - name: LORA_ALPHA
                      value: ${string(schema.spec.loraAlpha)}
                    - name: LEARNING_RATE
                      value: ${schema.spec.learningRate}
                    - name: EPOCHS
                      value: ${string(schema.spec.epochs)}
                    - name: BATCH_SIZE
                      value: ${string(schema.spec.batchSize)}
                    - name: GRAD_ACCUM
                      value: ${string(schema.spec.gradientAccumulation)}
                    - name: MAX_SEQ_LEN
                      value: ${string(schema.spec.maxSeqLength)}
                    - name: DATASET_FORMAT
                      value: ${schema.spec.datasetFormat}
                    - name: OUTPUT_FORMAT
                      value: ${schema.spec.outputFormat}
                    - name: OUTPUT_DIR
                      value: /workspace/output
                    - name: CACHE_BUCKET
                      value: ${platformconfig.data.?modelCacheBucket.orValue("")}
                    - name: DATASETS_BUCKET
                      value: ${platformconfig.data.?trainingDatasetsBucket.orValue("")}
                    - name: AUTO_DEPLOY
                      value: ${string(schema.spec.autoDeploy)}
                    - name: JOB_NAME
                      value: ${schema.metadata.name}
                    - name: NAMESPACE
                      value: ${schema.metadata.namespace}
                    - name: PUSH_TO_HUB
                      value: ${schema.spec.pushToHub}
                    - name: WANDB_PROJECT
                      value: ${schema.spec.wandbProject}
                    - name: HF_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: hf-token
                          key: token
                          optional: true
                    - name: WANDB_API_KEY
                      valueFrom:
                        secretKeyRef:
                          name: wandb-api-key
                          key: api-key
                          optional: true
                    - name: HF_HUB_ENABLE_HF_TRANSFER
                      value: "1"
                  resources:
                    requests:
                      cpu: ${schema.spec.workerCpu}
                      memory: ${schema.spec.workerMemory}
                      nvidia.com/gpu: ${schema.spec.gpuCount}
                    limits:
                      cpu: ${schema.spec.workerCpu}
                      memory: ${schema.spec.workerMemory}
                      nvidia.com/gpu: ${schema.spec.gpuCount}
                  volumeMounts:
                    - name: trainscript
                      mountPath: /scripts
                    - name: workspace
                      mountPath: /workspace
              volumes:
                - name: trainscript
                  configMap:
                    name: ${schema.metadata.name}-trainscript
                    items:
                      - key: train.py
                        path: train.py
                - name: workspace
                  emptyDir:
                    sizeLimit: 200Gi

    # --- CloudWatch Log Group (via ACK) ---
    - id: loggroup
      template:
        apiVersion: cloudwatchlogs.services.k8s.aws/v1alpha1
        kind: LogGroup
        metadata:
          name: ${schema.metadata.name}-finetune-logs
        spec:
          name: /ai-platform/fine-tuning/${schema.metadata.name}
          retentionDays: 30
          tags:
            ai-platform/managed-by: kro
            ai-platform/finetune-job: ${schema.metadata.name}
