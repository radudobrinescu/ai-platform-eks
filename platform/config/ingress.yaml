---
# NOTE: The three ingresses below share a single ALB via
# `alb.ingress.kubernetes.io/group.name: ai-platform` (the cluster-dashboard
# ingress in platform/services/cluster-dashboard/manifests.yaml joins the same
# group — four ingresses total). ALB-level annotations (scheme, inbound-cidrs,
# subnets, ...) must be IDENTICAL across all of them or the AWS Load Balancer
# Controller refuses to merge. Keep every inbound-cidrs value in sync.
#
# SCHEME: internet-facing (public ALB). Replaces the previous SSM-tunnel-only
# access path (ops/ssm-tunnel.sh). The SSM tunnel remains available as a
# fallback for networks without a stable public IP.
#
# INBOUND-CIDRS: operator allowlist. The ALB security group drops everything
# not in this list. Set this to your own operator/office CIDR(s); a fresh
# install should treat the value below as a placeholder to replace. Update all
# four occurrences (here x3 + cluster-dashboard) together.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-litellm
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 4000}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health/liveliness
    alb.ingress.kubernetes.io/inbound-cidrs: 213.157.191.17/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-openwebui
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 8080}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/inbound-cidrs: 213.157.191.17/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-langfuse
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 3000}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/public/health
    alb.ingress.kubernetes.io/inbound-cidrs: 213.157.191.17/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse-web
                port:
                  number: 3000
