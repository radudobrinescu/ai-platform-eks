---
# NOTE: The three ingresses below share a single ALB via
# `alb.ingress.kubernetes.io/group.name: ai-platform` (the cluster-dashboard
# ingress in platform/services/cluster-dashboard/manifests.yaml joins the same
# group — four ingresses total). ALB-level annotations (scheme, inbound-cidrs,
# subnets, ...) must be IDENTICAL across all of them or the AWS Load Balancer
# Controller refuses to merge. Keep every inbound-cidrs value in sync.
#
# SCHEME: internal (private ALB) — the secure default. The ALB has no public
# IP and is unreachable from the internet. Reach the UIs two ways:
#   * ./platformctl tunnel — kubectl port-forward straight to the pods (works
#     regardless of ALB scheme; the everyday operator path).
#   * The opt-in CloudFront edge (platform/services/edge) — public HTTPS via a
#     CloudFront VPC origin that connects privately to this internal ALB. That
#     is the supported way to expose the UIs publicly, with TLS + SSO in front.
# To instead expose the ALB directly to the internet (IP-allowlisted), flip all
# four `scheme` values to `internet-facing` and set inbound-cidrs to your IPs.
#
# INBOUND-CIDRS: source allowlist on the ALB security group. For the internal
# default this bounds which in-VPC sources (the CloudFront VPC origin, a VPN, a
# bastion) may reach the ALB — the edge README documents the exact rule for the
# CloudFront VPC origin. If you switch scheme to internet-facing, this becomes
# your public operator/office allowlist (never leave it 0.0.0.0/0). Set it to
# your own CIDRs; a fresh install should treat the value below as a placeholder.
# Keep all four occurrences (here x3 + cluster-dashboard) in sync.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-litellm
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 4000}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health/liveliness
    alb.ingress.kubernetes.io/inbound-cidrs: 213.157.191.17/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-openwebui
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 8080}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/inbound-cidrs: 213.157.191.17/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-langfuse
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 3000}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/public/health
    alb.ingress.kubernetes.io/inbound-cidrs: 213.157.191.17/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse-web
                port:
                  number: 3000
