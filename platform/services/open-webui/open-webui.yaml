apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai-platform
  labels:
    app: open-webui
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is ReadWriteOnce, so a rolling
  # update deadlocks — the new pod can't mount the volume the old pod still holds
  # (Multi-Attach). Recreate terminates the old pod first, then starts the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:v0.10.2
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://litellm.ai-platform.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
                  optional: true
            - name: WEBUI_AUTH
              value: "true"
            # --- SSO (Cognito OIDC) + per-user cost attribution ---
            # All secret refs are optional: until Terraform (enable_sso) creates
            # `sso-secrets`, OAuth stays disabled and local login still works.
            # OAuth activates automatically once the client id/secret exist.
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            # Hide the local email/password form so the UI goes straight to
            # Cognito SSO (single sign-on across the platform, no local login).
            - name: ENABLE_LOGIN_FORM
              value: "false"
            - name: OAUTH_PROVIDER_NAME
              value: "SSO"
            - name: OAUTH_SCOPES
              value: "openid email profile"
            - name: OAUTH_ROLES_CLAIM
              value: "cognito:groups"
            - name: ENABLE_OAUTH_ROLE_MANAGEMENT
              value: "true"
            - name: OAUTH_ALLOWED_ROLES
              value: "ai-platform-admins,ai-platform-developers,ai-platform-users"
            - name: OAUTH_ADMIN_ROLES
              value: "ai-platform-admins"
            # Forward the authenticated user to LiteLLM so spend is attributed
            # per user (LiteLLM captures the X-OpenWebUI-User-* headers as tags).
            - name: ENABLE_FORWARD_USER_INFO_HEADERS
              value: "true"
            - name: OPENID_PROVIDER_URL
              valueFrom:
                secretKeyRef:
                  name: sso-secrets
                  key: openid-config-url
                  optional: true
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sso-secrets
                  key: open-webui-client-id
                  optional: true
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sso-secrets
                  key: open-webui-client-secret
                  optional: true
            - name: WEBUI_URL
              valueFrom:
                secretKeyRef:
                  name: sso-secrets
                  key: open-webui-public-url
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: ai-platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: ai-platform
spec:
  type: ClusterIP
  selector:
    app: open-webui
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: open-webui
  namespace: ai-platform
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: open-webui
