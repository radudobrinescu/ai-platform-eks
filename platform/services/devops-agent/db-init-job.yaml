# db-init Job — provisions the `devops_agent` database on platform-db-0.
#
# Runs as an ArgoCD PreSync hook so it executes BEFORE the Deployments
# come up on every sync (idempotent).
#
# Why a Job (not an initContainer on the Deployments)?
# - One-time setup, shouldn't block pod startup on every restart.
# - Single source of truth for schema migrations (future: V1 → V2).
# - Visible/auditable in `kubectl get jobs -n devops-agent`.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: devops-agent-db-init
  namespace: devops-agent
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-agent-db-init
        app.kubernetes.io/part-of: devops-agent
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations: []
      containers:
        - name: psql
          image: postgres:16-alpine
          command: ["/bin/sh", "/scripts/db_init.sh"]
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: devops-agent-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: devops-agent-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: devops-agent-config
                  key: DB_NAME
            # Postgres superuser (the existing `platform` user used by
            # litellm and langfuse — has CREATEDB privilege).
            - name: PG_SUPERUSER
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: username
            - name: PG_SUPERPASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # psql writes ~/.psql_history
            runAsNonRoot: true
            runAsUser: 70                   # 'postgres' uid in postgres:16-alpine
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: scripts
          configMap:
            name: devops-agent-scripts
            defaultMode: 0755
