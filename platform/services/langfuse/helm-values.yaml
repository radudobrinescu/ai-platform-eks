# Langfuse Helm Values — LLM Observability & Tracing
# Chart: langfuse/langfuse v1.5.20
# Repository: https://langfuse.github.io/langfuse-k8s
#
# Uses shared platform-db PostgreSQL, bundled ClickHouse, Redis, and MinIO.
# Secrets are created by Terraform (langfuse-secrets, platform-db-credentials)
# and referenced here via secretKeyRef — no secrets stored in git.

langfuse:
  salt:
    secretKeyRef:
      name: langfuse-secrets
      key: salt

  nextauth:
    # URL of the Langfuse web deployment as seen by the BROWSER. NextAuth
    # validates the Host header of every sign-in request against this URL,
    # so it must match exactly what the user types into their browser.
    #
    # Default `http://localhost:3000` works out of the box with the SSM
    # tunnel workflow (`./ops/ssm-tunnel.sh`).
    #
    # When accessing Langfuse through the ALB, edit this to the ALB
    # hostname after the first ArgoCD sync, for example:
    #   url: "http://k8s-aiplatform-<hash>.<region>.elb.amazonaws.com:3000"
    # Behind a real domain + cert it would be `https://langfuse.<your-domain>`.
    url: "http://localhost:3000"
    secret:
      secretKeyRef:
        name: langfuse-secrets
        key: nextauth-secret

  encryptionKey:
    secretKeyRef:
      name: langfuse-secrets
      key: encryption-key

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  ingress:
    enabled: false

# External PostgreSQL — shared platform-db (managed in platform/services/litellm/).
# Chart uses postgresql.* for DB config, not a separate database section.
# postgresql.auth.existingSecret + secretKeys for password from K8s secret.
postgresql:
  deploy: false
  host: platform-db.ai-platform.svc.cluster.local
  port: 5432
  auth:
    username: platform
    database: langfuse
    existingSecret: platform-db-credentials
    secretKeys:
      userPasswordKey: password

# ClickHouse for analytics/event ingestion (also stores trace events)
clickhouse:
  deploy: true
  replicaCount: 1
  auth:
    existingSecret: langfuse-secrets
    existingSecretKey: clickhouse-password
  persistence:
    enabled: true
    size: 50Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  zookeeper:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# Redis for caching and queue management
redis:
  deploy: true
  auth:
    existingSecret: langfuse-secrets
    existingSecretPasswordKey: redis-password
  primary:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: gp3

# MinIO (bundled S3-compatible blob storage for traces/events)
s3:
  deploy: true
  accessKeyId:
    value: "minio"
  secretAccessKey:
    secretKeyRef:
      name: langfuse-secrets
      key: s3-secret-key
  auth:
    rootUser: "minio"
    existingSecret: langfuse-secrets
    rootPasswordSecretKey: s3-secret-key
    rootUserSecretKey: ""
