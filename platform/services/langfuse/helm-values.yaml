# Langfuse Helm Values — LLM Observability & Tracing
# Chart: langfuse/langfuse v1.5.20
# Repository: https://langfuse.github.io/langfuse-k8s
#
# Uses shared platform-db PostgreSQL, bundled ClickHouse, Redis, and MinIO.
# Secrets are created by Terraform (langfuse-secrets, platform-db-credentials)
# and referenced here via secretKeyRef — no secrets stored in git.

langfuse:
  # --- Tracing on first boot (turnkey) ---
  # The langfuse-init Secret (Terraform-generated, ai-platform ns) carries the
  # headless-initialization env vars (LANGFUSE_INIT_ORG/PROJECT/USER + project
  # keys) plus NEXTAUTH_URL. On first boot Langfuse creates the org, project,
  # API keys, and admin user — and LiteLLM is handed the SAME keys
  # (langfuse-litellm-keys), so the very first model call is traced with no UI
  # clicks. See terraform/30.eks/30.cluster/langfuse-init.tf.
  #
  # additionalEnvFrom pulls every LANGFUSE_INIT_* key (none collide with the
  # chart's own env). NEXTAUTH_URL is set via additionalEnv below instead of
  # here, because the chart renders its own NEXTAUTH_URL and `env` entries
  # appended later win over earlier ones — `envFrom` would be shadowed.
  additionalEnvFrom:
    - secretRef:
        name: langfuse-init
  additionalEnv:
    # Browser-facing URL — Terraform-controlled (var.langfuse_nextauth_url),
    # surfaced through the langfuse-init Secret. Appended after the chart's own
    # NEXTAUTH_URL so this value wins; no manual post-install edit of this file.
    - name: NEXTAUTH_URL
      valueFrom:
        secretKeyRef:
          name: langfuse-init
          key: NEXTAUTH_URL

  salt:
    secretKeyRef:
      name: langfuse-secrets
      key: salt

  nextauth:
    # Fallback only. The effective browser-facing URL comes from the
    # langfuse-init Secret via additionalEnv above (NextAuth validates the
    # sign-in Host header against it). This localhost default keeps the chart
    # renderable and works with the SSM tunnel (./ops/ssm-tunnel.sh) when no
    # langfuse-init Secret is present.
    url: "http://localhost:3000"
    secret:
      secretKeyRef:
        name: langfuse-secrets
        key: nextauth-secret

  encryptionKey:
    secretKeyRef:
      name: langfuse-secrets
      key: encryption-key

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  ingress:
    enabled: false

# External PostgreSQL — shared platform-db (managed in platform/services/litellm/).
# Chart uses postgresql.* for DB config, not a separate database section.
# postgresql.auth.existingSecret + secretKeys for password from K8s secret.
postgresql:
  deploy: false
  host: platform-db.ai-platform.svc.cluster.local
  port: 5432
  auth:
    username: platform
    database: langfuse
    existingSecret: platform-db-credentials
    secretKeys:
      userPasswordKey: password

# ClickHouse for analytics/event ingestion (also stores trace events)
clickhouse:
  deploy: true
  replicaCount: 1
  auth:
    existingSecret: langfuse-secrets
    existingSecretKey: clickhouse-password
  persistence:
    enabled: true
    size: 50Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  zookeeper:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# Redis for caching and queue management
redis:
  deploy: true
  auth:
    existingSecret: langfuse-secrets
    existingSecretPasswordKey: redis-password
  primary:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: gp3

# MinIO (bundled S3-compatible blob storage for traces/events)
s3:
  deploy: true
  accessKeyId:
    value: "minio"
  secretAccessKey:
    secretKeyRef:
      name: langfuse-secrets
      key: s3-secret-key
  auth:
    rootUser: "minio"
    existingSecret: langfuse-secrets
    rootPasswordSecretKey: s3-secret-key
    rootUserSecretKey: ""
