# Langfuse Helm Values — LLM Observability & Tracing
# Chart: langfuse/langfuse v1.5.20
# Repository: https://langfuse.github.io/langfuse-k8s
#
# Uses shared platform-db PostgreSQL, bundled ClickHouse, Redis, and MinIO.
# Secrets are created by Terraform (langfuse-secrets, platform-db-credentials)
# and referenced here via secretKeyRef — no secrets stored in git.

langfuse:
  # --- Tracing on first boot (turnkey) ---
  # The langfuse-init Secret (Terraform-generated, ai-platform ns) carries the
  # headless-initialization env vars (LANGFUSE_INIT_ORG/PROJECT/USER + project
  # keys) plus NEXTAUTH_URL. On first boot Langfuse creates the org, project,
  # API keys, and admin user — and LiteLLM is handed the SAME keys
  # (langfuse-litellm-keys), so the very first model call is traced with no UI
  # clicks. See terraform/30.eks/30.cluster/langfuse-init.tf.
  #
  # The LANGFUSE_INIT_* keys drive headless initialization (org/project/API
  # keys/admin user on first boot). This chart (1.5.20) has NO `additionalEnvFrom`
  # support — it only honors `additionalEnv` (a list) — so each key is pulled
  # individually from the langfuse-init Secret via secretKeyRef. We deliberately
  # do NOT include NEXTAUTH_URL here: the chart already emits it from
  # `nextauth.url` (below), and a second entry would make ServerSideApply reject
  # the sync ("duplicate entries for key NEXTAUTH_URL"). `nextauth.url` is the
  # single source of truth for the browser-facing URL.
  additionalEnv:
    - name: LANGFUSE_INIT_ORG_ID
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_ORG_ID } }
    - name: LANGFUSE_INIT_ORG_NAME
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_ORG_NAME } }
    - name: LANGFUSE_INIT_PROJECT_ID
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_ID } }
    - name: LANGFUSE_INIT_PROJECT_NAME
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_NAME } }
    - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_PUBLIC_KEY } }
    - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_PROJECT_SECRET_KEY } }
    - name: LANGFUSE_INIT_USER_EMAIL
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_USER_EMAIL } }
    - name: LANGFUSE_INIT_USER_NAME
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_USER_NAME } }
    - name: LANGFUSE_INIT_USER_PASSWORD
      valueFrom: { secretKeyRef: { name: langfuse-init, key: LANGFUSE_INIT_USER_PASSWORD } }

  salt:
    secretKeyRef:
      name: langfuse-secrets
      key: salt

  nextauth:
    # Browser-facing URL — NextAuth validates the sign-in Host header against it,
    # so it must match what users type. The localhost default works with the SSM
    # tunnel (./ops/ssm-tunnel.sh). For ALB/domain access, override this value
    # (it's the single source of truth; the Terraform var.langfuse_nextauth_url
    # is surfaced for reference but this is what the pod uses).
    url: "http://localhost:3000"
    secret:
      secretKeyRef:
        name: langfuse-secrets
        key: nextauth-secret

  encryptionKey:
    secretKeyRef:
      name: langfuse-secrets
      key: encryption-key

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  ingress:
    enabled: false

# External PostgreSQL — shared platform-db (managed in platform/services/litellm/).
# Chart uses postgresql.* for DB config, not a separate database section.
# postgresql.auth.existingSecret + secretKeys for password from K8s secret.
postgresql:
  deploy: false
  host: platform-db.ai-platform.svc.cluster.local
  port: 5432
  auth:
    username: platform
    database: langfuse
    existingSecret: platform-db-credentials
    secretKeys:
      userPasswordKey: password

# ClickHouse for analytics/event ingestion (also stores trace events)
clickhouse:
  deploy: true
  replicaCount: 1
  auth:
    existingSecret: langfuse-secrets
    existingSecretKey: clickhouse-password
  persistence:
    enabled: true
    size: 50Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  zookeeper:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# Redis for caching and queue management
redis:
  deploy: true
  auth:
    existingSecret: langfuse-secrets
    existingSecretPasswordKey: redis-password
  primary:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: gp3

# MinIO (bundled S3-compatible blob storage for traces/events)
s3:
  deploy: true
  accessKeyId:
    value: "minio"
  secretAccessKey:
    secretKeyRef:
      name: langfuse-secrets
      key: s3-secret-key
  auth:
    rootUser: "minio"
    existingSecret: langfuse-secrets
    rootPasswordSecretKey: s3-secret-key
    rootUserSecretKey: ""
