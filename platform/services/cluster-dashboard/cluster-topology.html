<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Platform — Cluster Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"] {
  --bg: #151722;
  --surface: #1c1f2e;
  --surface-hover: #242738;
  --border: #2a2d3e;
  --border-light: #353849;
  --text: #e8eaed;
  --text-secondary: #9ba1b0;
  --text-muted: #5f6577;
  --accent: #5b5ff6;
  --accent-soft: rgba(91,95,246,0.12);
  --green: #3ddc84;
  --green-soft: rgba(61,220,132,0.12);
  --amber: #ffb340;
  --amber-soft: rgba(255,179,64,0.12);
  --red: #ff6b6b;
  --red-soft: rgba(255,107,107,0.1);
  --purple: #a78bfa;
  --purple-soft: rgba(167,139,250,0.12);
  --cyan: #67e8f9;
  --font: 'Manrope', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
}
[data-theme="light"] {
  --bg: #f8f9fb;
  --surface: #ffffff;
  --surface-hover: #f3f4f6;
  --border: #e5e7eb;
  --border-light: #d1d5db;
  --text: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --accent: #4f46e5;
  --accent-soft: rgba(79,70,229,0.08);
  --green: #059669;
  --green-soft: rgba(5,150,105,0.08);
  --amber: #d97706;
  --amber-soft: rgba(217,119,6,0.08);
  --red: #dc2626;
  --red-soft: rgba(220,38,38,0.06);
  --purple: #7c3aed;
  --purple-soft: rgba(124,58,237,0.08);
  --cyan: #0891b2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Layout */
.shell { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }

/* Topbar */
.topbar {
  grid-column: 1 / -1; padding: 0 24px;
  display: flex; align-items: center; gap: 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.logo { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
.logo span { color: var(--accent); }
.topbar-sep { width: 1px; height: 24px; background: var(--border); }
.cluster-id { font-family: var(--mono); font-size: 12px; color: var(--text-muted); padding: 4px 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.topbar-spacer { flex: 1; }
.theme-toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; font-size: 14px; line-height: 1; color: var(--text-secondary); transition: all 0.2s; }
.theme-toggle:hover { background: var(--surface-hover); border-color: var(--border-light); }
.live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--green); }
.live-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }

/* Sidebar */
.sidebar {
  position: relative;
  padding: 16px 12px; overflow-y: auto;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 12px;
}
.sidebar-resizer {
  position: absolute; top: 0; right: -2px; bottom: 0; width: 4px;
  cursor: col-resize; z-index: 100; background: transparent; transition: background 0.15s;
}
.sidebar-resizer:hover { background: var(--accent); opacity: 0.5; }
.sidebar-resizer.active { background: var(--accent); opacity: 1; }
.card {
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.card-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-muted); margin-bottom: 12px;
}
.stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; }
.stat-label { font-size: 13px; color: var(--text-secondary); }
.stat-val { font-size: 20px; font-weight: 800; }
.stat-val.purple { color: var(--purple); }

/* Model items */
.model-item {
  padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 6px;
  background: rgba(255,255,255,0.015); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
.model-item:hover { background: var(--surface-hover); border-color: var(--border-light); }
.model-item.selected { border-color: var(--accent); background: var(--accent-soft); }
.model-top { display: flex; align-items: center; gap: 8px; }
.mdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mdot.running { background: var(--green); box-shadow: 0 0 6px rgba(61,220,132,0.5); }
.mdot.deploying { background: var(--amber); animation: pulse 1.5s infinite; }
.mdot.pending { background: var(--text-muted); }
.mname { font-size: 14px; font-weight: 700; }
.mstatus { margin-left: auto; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
.mstatus.running { background: var(--green-soft); color: var(--green); }
.mstatus.deploying { background: var(--amber-soft); color: var(--amber); }
.mstatus.pending { background: rgba(255,255,255,0.05); color: var(--text-muted); }
.mdetail { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); }
.mtimer { font-size: 11px; font-family: var(--mono); color: var(--amber); font-weight: 600; margin-top: 3px; }
.model-empty { font-size: 12px; color: var(--text-muted); padding: 12px 0; }

/* Events */
.event-list { font-size: 11px; font-family: var(--mono); color: var(--text-secondary); max-height: 200px; overflow-y: auto; }
.ev { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); line-height: 1.6; }
.ev-time { color: var(--text-muted); }
.ev-add { color: var(--green); }
.ev-del { color: var(--red); }
.ev-mod { color: var(--amber); }

/* Main */
.main { padding: 16px; overflow-y: auto; background: var(--bg); }

/* Pools */
.pool { margin-bottom: 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); overflow: hidden; transition: opacity 0.3s; }
.pool.dimmed { opacity: 0.2; }
.pool-hdr { padding: 12px 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.pool-hdr .badge { font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.pool-hdr .pool-name { font-size: 14px; font-weight: 700; }
.pool-hdr .cnt { font-size: 11px; color: var(--text-muted); padding: 2px 8px; background: rgba(255,255,255,0.04); border-radius: 10px; }
.pool-hdr .desc { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.gpu-shared .pool-hdr { background: rgba(167,139,250,0.05); }
.gpu-shared .badge { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
.gpu-inference .pool-hdr { background: rgba(255,179,64,0.04); }
.gpu-inference .badge { background: var(--amber-soft); color: var(--amber); border: 1px solid rgba(255,179,64,0.2); }
.default .pool-hdr { background: rgba(91,95,246,0.04); }
.default .badge { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(91,95,246,0.2); }
.mng .pool-hdr { background: rgba(61,220,132,0.04); }
.mng .badge { background: var(--green-soft); color: var(--green); border: 1px solid rgba(61,220,132,0.2); }

.pool-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 8px; padding: 10px; }
.pool-empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 12px; }

/* Node cards */
.nd { background: var(--surface-hover); padding: 16px 18px; border-radius: 8px; border: 1px solid var(--border); transition: all 0.2s; }
.nd.dimmed { opacity: 0.15; }
.nd.highlight { background: var(--accent-soft); border-color: var(--accent); }
.nd-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.nd-instance { font-size: 15px; font-weight: 800; font-family: var(--mono); }
.nd-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; border: 1px solid; }
.nd-tag.spot { background: rgba(91,95,246,0.08); color: var(--accent); border-color: rgba(91,95,246,0.2); }
.nd-tag.od { background: var(--amber-soft); color: var(--amber); border-color: rgba(255,179,64,0.2); }
.nd-tag.warm { background: var(--green-soft); color: var(--green); border-color: rgba(61,220,132,0.2); }
.nd-tag.new { background: var(--green-soft); color: var(--green); border-color: rgba(61,220,132,0.3); animation: fadeIn 0.5s; }
.nd-host { margin-left: auto; font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

/* Pods */
.nd-pods { display: flex; flex-wrap: wrap; gap: 5px; }
.pd { height: 24px; padding: 0 9px; border-radius: 5px; font-size: 11px; font-family: var(--mono); display: flex; align-items: center; font-weight: 500; cursor: default; border: 1px solid; }
.pd.inf { background: var(--red-soft); color: var(--red); border-color: rgba(255,107,107,0.2); }
.pd.plat { background: var(--accent-soft); color: #818cf8; border-color: rgba(91,95,246,0.2); }
.pd.gpu-op { background: var(--green-soft); color: var(--green); border-color: rgba(61,220,132,0.2); }
.pd.kuberay { background: rgba(103,232,249,0.1); color: var(--cyan); border-color: rgba(103,232,249,0.2); }
.pd.sys { background: rgba(255,255,255,0.03); color: var(--text-muted); border-color: var(--border); }
.pd.new { background: var(--green-soft); color: var(--green); border-color: rgba(61,220,132,0.3); animation: fadeIn 0.4s; }

/* Namespace legend */
.ns-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
.ns-leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-muted); font-family: var(--mono); }
.ns-leg-dot { width: 8px; height: 8px; border-radius: 3px; }

/* GPU meter */
.gpu-m { margin-top: 12px; padding: 12px 14px; background: rgba(167,139,250,0.04); border-radius: var(--radius-sm); border: 1px solid rgba(167,139,250,0.1); }
.gpu-m-label { font-size: 10px; font-weight: 700; color: var(--purple); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-family: var(--mono); }
.gpu-slots { display: flex; gap: 5px; }
.gs { flex: 1; min-height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: var(--mono); padding: 6px 8px; text-align: center; word-break: break-all; line-height: 1.3; }
.gs.used { background: linear-gradient(135deg, #7c3aed, #6366f1); color: #fff; box-shadow: 0 2px 8px rgba(124,58,237,0.3); }
.gs.used.multi { border-radius: 0; box-shadow: none; border-right: 1px solid rgba(255,255,255,0.15); position: relative; }
.gs.used.multi.first { border-radius: 6px 0 0 6px; }
.gs.used.multi.last { border-radius: 0 6px 6px 0; border-right: none; }
.gs.used.multi:not(.first) { background: linear-gradient(135deg, #6366f1, #7c3aed); }
.gs-badge { display: inline-block; font-size: 9px; font-weight: 700; background: rgba(255,255,255,0.2); border-radius: 3px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; letter-spacing: 0.3px; }
.gs.free { background: rgba(167,139,250,0.05); border: 1px dashed rgba(167,139,250,0.25); color: var(--text-muted); }

@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.3;} }
@keyframes fadeIn { from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body data-theme="dark">
<div class="shell">
  <div class="topbar">
    <div class="logo"><span>AI</span> Platform</div>
    <div class="topbar-sep"></div>
    <div class="cluster-id" id="top-cluster">connecting...</div>
    <div class="topbar-spacer"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">◐</button>
    <div class="live-badge" id="live-badge">Live</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-resizer" id="sidebar-resizer"></div>
    <div class="card">
      <div class="card-title">Cluster</div>
      <div class="stat-row"><span class="stat-label">Nodes</span><span class="stat-val" id="s-nodes">–</span></div>
      <div class="stat-row"><span class="stat-label">GPU Slots</span><span class="stat-val purple" id="s-gpus">–</span></div>
      <div class="stat-row"><span class="stat-label">Models</span><span class="stat-val" id="s-models">–</span></div>
    </div>
    <div class="card">
      <div class="card-title">Inference Endpoints</div>
      <div id="sidebar-models"><div class="model-empty">No models deployed</div></div>
    </div>
    <div class="card" style="flex:1;min-height:0;">
      <div class="card-title">Activity</div>
      <div class="event-list" id="event-log"><div class="ev"><span class="ev-time">--:--</span> waiting...</div></div>
    </div>
  </div>

  <div class="main" id="main-scroll">
    <div id="infra"></div>
  </div>
</div>

<script>
const POOLS = [
  { key:'gpu-shared', cls:'gpu-shared', label:'KARPENTER', name:'gpu-shared', desc:'Spot/On-demand · Time-sliced · EBS Snapshot' },
  { key:'gpu-inference', cls:'gpu-inference', label:'KARPENTER', name:'gpu-inference', desc:'Spot/On-demand · Dedicated GPU · Scales to zero' },
  { key:'default', cls:'default', label:'KARPENTER', name:'default', desc:'Spot/On-demand · Platform services' },
  { key:'__mng__', cls:'mng', label:'MNG', name:'CriticalAddons', desc:'Managed · Graviton · Always-on' },
];
const DAEMONSETS = ['aws-node','kube-proxy','ebs-csi-node','eks-pod-identity-agent','aws-for-fluent-bit','cloudwatch-agent','fluent-bit','prometheus-node-exporter','nfd-worker','dcgm-exporter'];
const SKIP_POD = ['-register','cleanup'];
const NS_CLS = {'inference':'inf','ai-platform':'plat','kuberay':'kuberay','gpu-operator':'gpu-op','external-secrets':'sys','grafana-operator':'sys'};
const NS_COLORS = {'inference':['rgba(255,107,107,0.3)','var(--red)'],'ai-platform':['rgba(91,95,246,0.3)','#818cf8'],'kuberay':['rgba(103,232,249,0.3)','var(--cyan)'],'gpu-operator':['rgba(61,220,132,0.3)','var(--green)']};

let prevNodes=new Set(),prevPods=new Set(),prevEps=new Set(),prevEpSt={};
let events=[],connected=false,selectedModel=null,lastData=null;

function short(n){return n.replace(/-[a-z0-9]{5,10}(-[a-z0-9]{5})?$/,'').replace(/-[0-9]+$/,'');}
function isDS(n){return DAEMONSETS.some(d=>n.startsWith(d));}
function skipEv(n){return SKIP_POD.some(s=>n.includes(s));}
function ts(){return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}

function log(type,msg){
  events.unshift({t:ts(),c:type==='add'?'ev-add':type==='del'?'ev-del':'ev-mod',m:msg});
  if(events.length>25)events.pop();
  document.getElementById('event-log').innerHTML=events.map(e=>`<div class="ev"><span class="ev-time">${e.t}</span> <span class="${e.c}">${e.m}</span></div>`).join('');
}

function selectModel(name){selectedModel=selectedModel===name?null:name;renderAll();}

function renderModels(eps){
  const el=document.getElementById('sidebar-models');
  if(!eps.length){el.innerHTML='<div class="model-empty">No models deployed</div>';return;}
  el.innerHTML=eps.map(ep=>{
    const ready=ep.ready==='True',st=ep.modelStatus||'Pending';
    const cls=ready?'running':st==='DEPLOYING'?'deploying':'pending';
    const sel=selectedModel===ep.name?'selected':'';
    const elapsed=Math.floor((Date.now()-new Date(ep.created).getTime())/1000);
    const timer=ready?'':`<div class="mtimer">⏱ ${Math.floor(elapsed/60)}m ${elapsed%60}s</div>`;
    const gpuCount=ep.gpuCount||1,tp=ep.tp||1,pp=ep.pp||1;
    let strat=gpuCount===1?'1 GPU':tp>1&&pp>1?`TP=${tp}×PP=${pp}`:tp>1?`TP=${tp}`:pp>1?`PP=${pp}`:`${gpuCount} GPU`;
    const mode=ep.shared?'shared':strat;
    return `<div class="model-item ${sel}" onclick="selectModel('${ep.name}')">
      <div class="model-top"><div class="mdot ${cls}"></div><div class="mname">${ep.name}</div><div class="mstatus ${cls}">${st}</div></div>
      <div class="mdetail">${mode} · ${ep.model}</div>${timer}</div>`;
  }).join('');
}

function renderAll(){if(!lastData)return;renderModels(lastData.endpoints);renderInfra(lastData.nodes,lastData.pods);}

function renderInfra(nodes,pods){
  const pools={};
  for(const n of nodes){const p=n.pool||'__mng__';(pools[p]=pools[p]||[]).push(n);}
  const podsByNode={};
  for(const p of pods){if(!p.node||isDS(p.name))continue;(podsByNode[p.node]=podsByNode[p.node]||[]).push(p);}
  const modelNodes=new Set();
  if(selectedModel)for(const p of pods)if(p.namespace==='inference'&&p.name.startsWith(selectedModel)&&p.node)modelNodes.add(p.node);
  // Build endpoint lookup by name for TP/PP badge on GPU slots
  const epByName={};
  if(lastData)for(const ep of lastData.endpoints)epByName[ep.name]=ep;

  let html='';
  for(const pool of POOLS){
    const pNodes=pools[pool.key]||[];
    const poolHasModel=!selectedModel||pNodes.some(n=>modelNodes.has(n.name));
    html+=`<div class="pool ${pool.cls} ${selectedModel&&!poolHasModel?'dimmed':''}">`;
    html+=`<div class="pool-hdr"><span class="badge">${pool.label}</span><span class="pool-name">${pool.name}</span><span class="cnt">${pNodes.length}</span><span class="desc">${pool.desc}</span></div>`;
    if(!pNodes.length){html+=`<div class="pool-empty">No nodes — scales from zero when workloads arrive</div>`;}
    else{
      html+=`<div class="pool-body">`;
      for(const node of pNodes){
        const ndPods=podsByNode[node.name]||[];
        const isNew=(Date.now()-new Date(node.created).getTime())<120000;
        const isWarm=ndPods.some(p=>p.name.includes('warmup'));
        const cap=node.capacity==='spot'?'spot':'od';
        const capLbl=node.capacity==='spot'?'spot':'on-demand';
        const host=node.name.split('.')[0];
        const zone=node.zone.replace(/eu-central-/,'');
        const nodeDim=selectedModel&&!modelNodes.has(node.name)?'dimmed':'';
        const nodeHL=selectedModel&&modelNodes.has(node.name)?'highlight':'';

        html+=`<div class="nd ${nodeDim} ${nodeHL}">`;
        html+=`<div class="nd-top"><span class="nd-instance">${node.instance}</span><span class="nd-tag ${cap}">${capLbl}</span>`;
        if(isWarm)html+=`<span class="nd-tag warm">warm pool</span>`;
        if(isNew)html+=`<span class="nd-tag new">new</span>`;
        html+=`<span class="nd-host">${host} · ${zone}</span></div>`;

        if(ndPods.length){
          html+=`<div class="nd-pods">`;
          const nsUsed=new Set();
          for(const p of ndPods){
            const isNewP=(Date.now()-new Date(p.created).getTime())<30000;
            let c=NS_CLS[p.namespace]||'sys';if(isNewP)c='new';
            nsUsed.add(p.namespace);
            html+=`<span class="pd ${c}" title="${p.namespace}/${p.name}">${short(p.name)}</span>`;
          }
          html+=`</div>`;
          const legendNs=[...nsUsed].filter(ns=>NS_COLORS[ns]);
          if(legendNs.length>0){
            html+=`<div class="ns-legend">`;
            for(const ns of legendNs){const[bg,fg]=NS_COLORS[ns];html+=`<div class="ns-leg-item"><div class="ns-leg-dot" style="background:${bg};"></div>${ns}</div>`;}
            html+=`</div>`;
          }
        }

        if(node.gpu>0){
          const gpuPods=ndPods.filter(p=>p.gpu>0);
          const gpuLabel=node.gpuProduct||node.instance;
          html+=`<div class="gpu-m"><div class="gpu-m-label">${gpuLabel} · ${node.gpu} GPU slot${node.gpu>1?'s':''}</div><div class="gpu-slots">`;
          let slotIdx=0;
          for(const gp of gpuPods){
            const podName=gp.name;
            let label;
            if(podName.includes('warmup')) label='warmup';
            else label=podName.replace(/-[a-z0-9]{5}-(?:gpu-workers-worker|head).*$/,'').replace(/-gpu-workers.*$/,'').replace(/-head.*$/,'');
            const gpuCount=gp.gpu||1;
            // Look up parallelism strategy from InferenceEndpoint
            const ep=epByName[label];
            let stratLabel='';
            if(gpuCount>1&&ep){
              const tp=ep.tp||1,pp=ep.pp||1;
              stratLabel=tp>1&&pp>1?`TP${tp}×PP${pp}`:tp>1?`TP=${tp}`:pp>1?`PP=${pp}`:`${gpuCount}GPU`;
            } else if(gpuCount>1){
              stratLabel=`${gpuCount}GPU`;
            }
            const stratBadge=stratLabel?`<div class="gs-badge">${stratLabel}</div>`:'';
            for(let g=0;g<gpuCount&&slotIdx<node.gpu;g++,slotIdx++){
              const spanLabel=g===0?`${label}${stratBadge}`:'';
              if(gpuCount>1) html+=`<div class="gs used multi${g===0?' first':''}${g===gpuCount-1?' last':''}">${spanLabel}</div>`;
              else html+=`<div class="gs used">${label}</div>`;
            }
          }
          for(;slotIdx<node.gpu;slotIdx++) html+=`<div class="gs free">free</div>`;
          html+=`</div></div>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  document.getElementById('infra').innerHTML=html;
}

function diff(data){
  const nN=new Set(data.nodes.map(n=>n.name)),pK=new Set(data.pods.map(p=>`${p.namespace}/${p.name}`)),eN=new Set(data.endpoints.map(e=>e.name));
  if(connected){
    for(const n of data.nodes)if(!prevNodes.has(n.name))log('add',`Node ${n.name.split('.')[0]} (${n.instance}) joined`);
    for(const n of prevNodes)if(!nN.has(n))log('del',`Node ${n.split('.')[0]} removed`);
    for(const p of data.pods){const k=`${p.namespace}/${p.name}`;if(!prevPods.has(k)&&p.namespace==='inference'&&!isDS(p.name)&&!skipEv(p.name))log('add',`Pod ${short(p.name)} → ${p.node?p.node.split('.')[0]:'pending'}`);}
    for(const k of prevPods){if(!pK.has(k)&&k.startsWith('inference/')){const n=k.split('/')[1];if(!skipEv(n))log('del',`Pod ${short(n)} removed`);}}
    for(const e of data.endpoints){if(!prevEps.has(e.name))log('add',`Model "${e.name}" deployed → ${e.modelStatus}`);else if(prevEpSt[e.name]!==e.modelStatus){const isFlap=prevEpSt[e.name]==='RUNNING'&&(!e.modelStatus||e.modelStatus==='Pending');if(!isFlap)log(e.ready==='True'?'add':'mod',`Model "${e.name}" → ${e.modelStatus}${e.ready==='True'?' ✓':''}`);}}
    for(const n of prevEps)if(!eN.has(n))log('del',`Model "${n}" removed`);
  }
  prevNodes=nN;prevPods=pK;prevEps=eN;prevEpSt={};
  for(const e of data.endpoints)prevEpSt[e.name]=e.modelStatus;
}

async function poll(){
  try{
    const r=await fetch('/data.json');if(!r.ok)throw 0;
    const data=await r.json();lastData=data;diff(data);
    document.getElementById('s-nodes').textContent=data.nodes.length;
    document.getElementById('s-gpus').textContent=data.nodes.reduce((s,n)=>s+n.gpu,0);
    document.getElementById('s-models').textContent=data.endpoints.length;
    document.getElementById('top-cluster').textContent=`ai-platform · ${data.nodes.length} nodes`;
    renderAll();
    if(!connected){connected=true;log('mod','Connected to cluster');}
  }catch(e){if(!connected)document.getElementById('top-cluster').textContent='connecting...';}
}
poll();setInterval(poll,2000);

function toggleTheme(){
  const body=document.body;
  const current=body.getAttribute('data-theme');
  const next=current==='dark'?'light':'dark';
  body.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
}
// Restore saved theme
const saved=localStorage.getItem('theme');
if(saved)document.body.setAttribute('data-theme',saved);

// Resizable sidebar
(function(){
  const resizer=document.getElementById('sidebar-resizer');
  const shell=document.querySelector('.shell');
  let dragging=false;
  resizer.addEventListener('mousedown',e=>{
    dragging=true;
    resizer.classList.add('active');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const w=Math.max(220,Math.min(420,e.clientX));
    shell.style.gridTemplateColumns=w+'px 1fr';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    resizer.classList.remove('active');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    localStorage.setItem('sidebar-w',shell.style.gridTemplateColumns);
  });
  const savedW=localStorage.getItem('sidebar-w');
  if(savedW)shell.style.gridTemplateColumns=savedW;
})();

</script>
