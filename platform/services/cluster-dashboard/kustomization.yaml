apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - manifests.yaml

# The HTML doesn't change often → no hash suffix → updated in place.
# The backend.py changes more often (especially during platform-health-agent
# integration) → hash suffix → automatic pod restart on change.
configMapGenerator:
  - name: cluster-dashboard-html
    namespace: ai-platform
    options:
      disableNameSuffixHash: true
    files:
      - cluster-topology.html
  - name: cluster-dashboard-backend
    namespace: ai-platform
    # Hash suffix ENABLED (kustomize default): backend.py is loaded once at
    # process start, so a content change must produce a new ConfigMap name →
    # new Deployment template → automatic pod restart. Without this the pod
    # keeps running stale code (e.g. a route the freshly-served HTML calls 404s).
    files:
      - scripts/backend.py
