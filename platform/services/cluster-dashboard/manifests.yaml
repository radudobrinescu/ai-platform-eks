# Cluster Dashboard manifests.
#
# Two roles in V2 (after platform-health-agent integration):
#   1. Cluster topology view (existing): polls K8s for nodes/pods/InferenceEndpoints.
#   2. Platform Health Agent approvals UI (new):  reads pending investigations from
#      the `platform_health_agent` postgres database; on click, creates a Remediator
#      Job in the `ai-platform` namespace.
#
# The Platform Health Agent now ships as a COMPONENT of this app — its
# event-watcher, RBAC, config, and scripts live alongside these manifests
# (pha-*.yaml, wired via kustomization.yaml), all in the ai-platform namespace.
# It is always synced but idles gracefully unless a Kiro API key Secret is
# present (see pha-event-watcher.yaml). When idle, the approvals UI auto-disables
# (no investigations in the DB) and the topology view works unchanged.
#
# backend.py is generated from cluster-dashboard/scripts/backend.py by
# kustomize (see kustomization.yaml). Image switched from python:3.12-alpine
# to python:3.12-slim because psycopg[binary] requires glibc, not musl.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-dashboard
  namespace: ai-platform
---
# Existing cluster-wide read access (topology view).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-dashboard
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["kro.run"]
    resources: ["inferenceendpoints"]
    verbs: ["list"]
  # Read the shared ALB ingress to discover its hostname for the Quick Links panel.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-dashboard
subjects:
  - kind: ServiceAccount
    name: cluster-dashboard
    namespace: ai-platform
roleRef:
  kind: ClusterRole
  name: cluster-dashboard
  apiGroup: rbac.authorization.k8s.io
---
# NOTE: the dashboard's Job-creation rights for spawning Remediator Jobs now
# live in pha-rbac.yaml (RoleBinding platform-health-agent-spawner-dashboard),
# since the agent + dashboard share the ai-platform namespace. Keeping all PHA
# RBAC in one file avoids a Role split across two manifests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
    spec:
      serviceAccountName: cluster-dashboard
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: install-pydeps
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # psycopg is optional from the backend's POV — if pip fails
              # (e.g. air-gapped), the dashboard still serves the topology
              # view, just without approvals.
              pip install --no-cache-dir --target=/pydeps psycopg[binary]==3.2.3 || true
          volumeMounts:
            - name: pydeps
              mountPath: /pydeps
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: ["ALL"] }
      containers:
        - name: backend
          image: python:3.12-slim
          command: ["python3", "/app/backend.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PYTHONPATH
              value: /pydeps
            - name: PYTHONUNBUFFERED
              value: "1"
            # platform-health-agent integration. These are SAFE to set even when the
            # agent is not deployed — backend gracefully reports
            # `approvals_available: false` if the DB is unreachable.
            - name: DB_HOST
              value: platform-db.ai-platform.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: platform_health_agent
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: platform-db-credentials, key: username } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-db-credentials, key: password } }
            - name: PLATFORM_HEALTH_AGENT_NAMESPACE
              value: ai-platform
            - name: APPROVAL_EXPIRY_HOURS
              value: "24"
            - name: MAX_REMEDIATIONS_PER_DAY
              value: "20"
            # An investigation Job has a 10-min hard deadline. Past this many minutes
            # an in-flight row is treated as stuck and becomes dismissable in the UI.
            - name: STALE_INVESTIGATION_MINUTES
              value: "15"
            - name: KIRO_MODEL_REMEDIATE
              value: "claude-opus-4.8"
            - name: PYTHON_IMAGE
              value: "python:3.12-slim"
            - name: KUBECTL_VERSION
              value: "v1.32.5"
            # Quick Links panel. The ALB-fronted UIs (Open WebUI / LiteLLM /
            # Langfuse) are discovered at runtime from the ingress hostname; only
            # ArgoCD's URL must be injected, from the Terraform-managed
            # cluster-dashboard-links ConfigMap (the EKS capability server_url).
            # optional: true → dashboard still works (ArgoCD link hidden) if unset.
            - name: ARGOCD_URL
              valueFrom:
                configMapKeyRef:
                  name: cluster-dashboard-links
                  key: argocdUrl
                  optional: true
          volumeMounts:
            - name: backend-script
              mountPath: /app
              readOnly: true
            - name: html
              mountPath: /html
              readOnly: true
            - name: pydeps
              mountPath: /pydeps
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
          livenessProbe:
            httpGet:
              path: /data.json
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /data.json
              port: 8080
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: backend-script
          configMap:
            name: cluster-dashboard-backend
        - name: html
          configMap:
            name: cluster-dashboard-html
        - name: pydeps
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  selector:
    app: cluster-dashboard
  ports:
    - port: 9090
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-dashboard
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 9090}]'
    alb.ingress.kubernetes.io/healthcheck-path: /data.json
    # inbound-cidrs: operator allowlist. Must stay IDENTICAL to
    # platform/config/ingress.yaml (shared ALB group "ai-platform").
    alb.ingress.kubernetes.io/inbound-cidrs: 212.93.153.21/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cluster-dashboard
                port:
                  number: 9090
