---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-dashboard
  namespace: ai-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-dashboard
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kro.run"]
    resources: ["inferenceendpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-dashboard
subjects:
  - kind: ServiceAccount
    name: cluster-dashboard
    namespace: ai-platform
roleRef:
  kind: ClusterRole
  name: cluster-dashboard
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-dashboard-proxy
  namespace: ai-platform
data:
  proxy.py: |
    #!/usr/bin/env python3
    """Serves static HTML and proxies /api/* to Kubernetes API with SA token auth.
    Streams watch responses without buffering for real-time updates."""
    import http.server, http.client, ssl, os, threading, select, socket

    PORT = 8080
    K8S_HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    K8S_PORT = int(os.environ.get("KUBERNETES_SERVICE_PORT", "443"))
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    HTML_DIR = "/html"

    def get_token():
        with open(TOKEN_PATH) as f:
            return f.read().strip()

    class Handler(http.server.SimpleHTTPRequestHandler):
        def __init__(self, *args, **kwargs):
            super().__init__(*args, directory=HTML_DIR, **kwargs)

        def do_GET(self):
            if self.path.startswith("/api/") or self.path.startswith("/apis/"):
                self._proxy()
            else:
                super().do_GET()

        def _proxy(self):
            try:
                ctx = ssl.create_default_context(cafile=CA_PATH)
                conn = http.client.HTTPSConnection(K8S_HOST, K8S_PORT, context=ctx, timeout=600)
                conn.request("GET", self.path, headers={
                    "Authorization": f"Bearer {get_token()}",
                    "Accept": "application/json",
                })
                resp = conn.getresponse()

                self.send_response(resp.status)
                self.send_header("Content-Type", resp.getheader("Content-Type", "application/json"))
                self.send_header("Cache-Control", "no-cache")
                self.send_header("X-Accel-Buffering", "no")
                self.end_headers()

                # Stream response — read 1 byte at a time from the socket to
                # avoid http.client's internal buffering on chunked responses.
                # This ensures watch events are forwarded immediately.
                raw_sock = resp.fp.raw._sock if hasattr(resp.fp, 'raw') else resp.fp
                if hasattr(raw_sock, '_sock'):
                    raw_sock = raw_sock._sock

                # Fallback: use resp.read with small amt for compatibility
                while True:
                    chunk = resp.read(1)
                    if not chunk:
                        break
                    self.wfile.write(chunk)
                    # Flush on newline (end of JSON event line)
                    if chunk == b'\n':
                        self.wfile.flush()

                conn.close()
            except (BrokenPipeError, ConnectionResetError):
                pass
            except Exception as e:
                try:
                    self.send_response(502)
                    self.end_headers()
                    self.wfile.write(f'{{"error":"{e}"}}'.encode())
                except Exception:
                    pass

        def log_message(self, format, *args):
            pass

    class ThreadedServer(http.server.HTTPServer):
        def process_request(self, req, addr):
            t = threading.Thread(target=self._handle, args=(req, addr), daemon=True)
            t.start()
        def _handle(self, req, addr):
            try:
                self.finish_request(req, addr)
            except Exception:
                pass
            finally:
                self.shutdown_request(req)

    if __name__ == "__main__":
        print(f"Dashboard proxy on :{PORT}")
        ThreadedServer(("", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
    spec:
      serviceAccountName: cluster-dashboard
      automountServiceAccountToken: true
      containers:
        - name: proxy
          image: python:3.12-alpine
          command: ["python3", "/app/proxy.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: proxy-script
              mountPath: /app
            - name: html
              mountPath: /html
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
      volumes:
        - name: proxy-script
          configMap:
            name: cluster-dashboard-proxy
        - name: html
          configMap:
            name: cluster-dashboard-html
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  selector:
    app: cluster-dashboard
  ports:
    - port: 9090
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-dashboard
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 9090}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/inbound-cidrs: 82.76.116.166/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cluster-dashboard
                port:
                  number: 9090
