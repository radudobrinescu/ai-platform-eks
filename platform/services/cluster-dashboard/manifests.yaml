# Cluster Dashboard manifests.
#
# Two roles in V2 (after devops-agent integration):
#   1. Cluster topology view (existing): polls K8s for nodes/pods/InferenceEndpoints.
#   2. DevOps Agent approvals UI (new):  reads pending investigations from
#      the `devops_agent` postgres database; on click, creates a Remediator
#      Job in the `devops-agent` namespace.
#
# Backwards-compatibility: when the devops-agent service is not deployed,
# the database doesn't exist and the approvals UI auto-disables — the
# topology view keeps working unchanged.
#
# backend.py is generated from cluster-dashboard/scripts/backend.py by
# kustomize (see kustomization.yaml). Image switched from python:3.12-alpine
# to python:3.12-slim because psycopg[binary] requires glibc, not musl.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-dashboard
  namespace: ai-platform
---
# Existing cluster-wide read access (topology view).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-dashboard
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["kro.run"]
    resources: ["inferenceendpoints"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-dashboard
subjects:
  - kind: ServiceAccount
    name: cluster-dashboard
    namespace: ai-platform
roleRef:
  kind: ClusterRole
  name: cluster-dashboard
  apiGroup: rbac.authorization.k8s.io
---
# New: scoped Job-creation rights in the devops-agent namespace.
# Used by the approvals UI to spawn Remediator Jobs after [Approve] click.
# Bound only inside the devops-agent namespace — cannot create Jobs anywhere else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-dashboard-approvals
  namespace: devops-agent
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-dashboard-approvals
  namespace: devops-agent
subjects:
  - kind: ServiceAccount
    name: cluster-dashboard
    namespace: ai-platform
roleRef:
  kind: Role
  name: cluster-dashboard-approvals
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
    spec:
      serviceAccountName: cluster-dashboard
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: install-pydeps
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # psycopg is optional from the backend's POV — if pip fails
              # (e.g. air-gapped), the dashboard still serves the topology
              # view, just without approvals.
              pip install --no-cache-dir --target=/pydeps psycopg[binary]==3.2.3 || true
          volumeMounts:
            - name: pydeps
              mountPath: /pydeps
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: ["ALL"] }
      containers:
        - name: backend
          image: python:3.12-slim
          command: ["python3", "/app/backend.py"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PYTHONPATH
              value: /pydeps
            - name: PYTHONUNBUFFERED
              value: "1"
            # devops-agent integration. These are SAFE to set even when the
            # agent is not deployed — backend gracefully reports
            # `approvals_available: false` if the DB is unreachable.
            - name: DB_HOST
              value: platform-db.ai-platform.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: devops_agent
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: platform-db-credentials, key: username } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-db-credentials, key: password } }
            - name: DEVOPS_AGENT_NAMESPACE
              value: devops-agent
            - name: APPROVAL_EXPIRY_HOURS
              value: "24"
            - name: MAX_REMEDIATIONS_PER_DAY
              value: "20"
            - name: KIRO_MODEL_REMEDIATE
              value: "claude-opus-4.6"
            - name: PYTHON_IMAGE
              value: "python:3.12-slim"
            - name: KUBECTL_VERSION
              value: "v1.32.5"
          volumeMounts:
            - name: backend-script
              mountPath: /app
              readOnly: true
            - name: html
              mountPath: /html
              readOnly: true
            - name: pydeps
              mountPath: /pydeps
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
          livenessProbe:
            httpGet:
              path: /data.json
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /data.json
              port: 8080
            initialDelaySeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: backend-script
          configMap:
            name: cluster-dashboard-backend
        - name: html
          configMap:
            name: cluster-dashboard-html
        - name: pydeps
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  selector:
    app: cluster-dashboard
  ports:
    - port: 9090
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-dashboard
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 9090}]'
    alb.ingress.kubernetes.io/healthcheck-path: /data.json
    alb.ingress.kubernetes.io/inbound-cidrs: 82.76.116.154/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cluster-dashboard
                port:
                  number: 9090
