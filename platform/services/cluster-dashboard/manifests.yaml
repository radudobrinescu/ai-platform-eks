---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-dashboard
  namespace: ai-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-dashboard
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["kro.run"]
    resources: ["inferenceendpoints"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-dashboard
subjects:
  - kind: ServiceAccount
    name: cluster-dashboard
    namespace: ai-platform
roleRef:
  kind: ClusterRole
  name: cluster-dashboard
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-dashboard-backend
  namespace: ai-platform
data:
  backend.py: |
    #!/usr/bin/env python3
    """Cluster dashboard backend.
    - Polls Kubernetes API every 2s, builds a JSON snapshot of cluster state.
    - Serves /data.json (the snapshot) and static HTML files.
    - Browser only fetches /data.json — no streaming, no proxying, no auth in browser.
    """
    import http.server, http.client, ssl, os, json, threading, time

    PORT = 8080
    K8S_HOST = os.environ.get("KUBERNETES_SERVICE_HOST", "kubernetes.default.svc")
    K8S_PORT = int(os.environ.get("KUBERNETES_SERVICE_PORT", "443"))
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    HTML_DIR = "/html"
    POLL_INTERVAL = 2

    snapshot = {"nodes": [], "pods": [], "endpoints": [], "ts": 0}
    snapshot_lock = threading.Lock()

    def get_token():
        with open(TOKEN_PATH) as f:
            return f.read().strip()

    def k8s_get(path):
        try:
            ctx = ssl.create_default_context(cafile=CA_PATH)
            conn = http.client.HTTPSConnection(K8S_HOST, K8S_PORT, context=ctx, timeout=10)
            conn.request("GET", path, headers={
                "Authorization": f"Bearer {get_token()}",
                "Accept": "application/json",
            })
            resp = conn.getresponse()
            if resp.status == 200:
                return json.loads(resp.read())
            return None
        except Exception:
            return None

    def build_snapshot():
        nodes_data = k8s_get("/api/v1/nodes")
        pods_data = k8s_get("/api/v1/pods")
        ep_data = k8s_get("/apis/kro.run/v1alpha1/namespaces/inference/inferenceendpoints")

        nodes = []
        if nodes_data:
            for n in nodes_data.get("items", []):
                labels = n.get("metadata", {}).get("labels", {})
                conditions = n.get("status", {}).get("conditions", [])
                ready = any(c.get("type") == "Ready" and c.get("status") == "True" for c in conditions)
                if not ready:
                    continue
                allocatable = n.get("status", {}).get("allocatable", {})
                nodes.append({
                    "name": n["metadata"]["name"],
                    "instance": labels.get("node.kubernetes.io/instance-type", "unknown"),
                    "pool": labels.get("karpenter.sh/nodepool", "__mng__" if labels.get("eks.amazonaws.com/nodegroup") else "__mng__"),
                    "zone": labels.get("topology.kubernetes.io/zone", ""),
                    "capacity": labels.get("karpenter.sh/capacity-type", labels.get("eks.amazonaws.com/capacityType", "on-demand")),
                    "gpu": int(allocatable.get("nvidia.com/gpu", "0")),
                    "created": n["metadata"].get("creationTimestamp", ""),
                })

        pods = []
        if pods_data:
            for p in pods_data.get("items", []):
                phase = p.get("status", {}).get("phase", "")
                if phase not in ("Running", "Pending"):
                    continue
                containers = p.get("spec", {}).get("containers", [])
                gpu_req = sum(int(c.get("resources", {}).get("requests", {}).get("nvidia.com/gpu", "0")) for c in containers)
                pods.append({
                    "name": p["metadata"]["name"],
                    "namespace": p["metadata"]["namespace"],
                    "node": p.get("spec", {}).get("nodeName", ""),
                    "phase": phase,
                    "gpu": gpu_req,
                    "created": p["metadata"].get("creationTimestamp", ""),
                })

        endpoints = []
        if ep_data:
            for ep in ep_data.get("items", []):
                status = ep.get("status", {})
                spec = ep.get("spec", {})
                endpoints.append({
                    "name": ep["metadata"]["name"],
                    "model": spec.get("model", ""),
                    "shared": spec.get("shared", False),
                    "modelStatus": status.get("modelStatus", "Pending"),
                    "ready": status.get("ready", "False"),
                    "message": status.get("message", ""),
                    "created": ep["metadata"].get("creationTimestamp", ""),
                })

        return {"nodes": nodes, "pods": pods, "endpoints": endpoints, "ts": time.time()}

    def poll_loop():
        global snapshot
        while True:
            try:
                new_snapshot = build_snapshot()
                with snapshot_lock:
                    snapshot = new_snapshot
            except Exception:
                pass
            time.sleep(POLL_INTERVAL)

    class Handler(http.server.SimpleHTTPRequestHandler):
        def __init__(self, *args, **kwargs):
            super().__init__(*args, directory=HTML_DIR, **kwargs)

        def do_GET(self):
            if self.path == "/data.json":
                with snapshot_lock:
                    data = json.dumps(snapshot)
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Cache-Control", "no-cache")
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                self.wfile.write(data.encode())
            else:
                super().do_GET()

        def log_message(self, format, *args):
            pass

    if __name__ == "__main__":
        # Start poller in background
        t = threading.Thread(target=poll_loop, daemon=True)
        t.start()
        # Wait for first snapshot
        time.sleep(3)
        print(f"Dashboard backend on :{PORT}")
        http.server.HTTPServer(("", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
      annotations:
        instrumentation.opentelemetry.io/inject-python: "false"
    spec:
      serviceAccountName: cluster-dashboard
      automountServiceAccountToken: true
      containers:
        - name: backend
          image: python:3.12-alpine
          command: ["python3", "/app/backend.py"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: backend-script
              mountPath: /app
            - name: html
              mountPath: /html
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /data.json
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /data.json
              port: 8080
            initialDelaySeconds: 5
      volumes:
        - name: backend-script
          configMap:
            name: cluster-dashboard-backend
        - name: html
          configMap:
            name: cluster-dashboard-html
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-dashboard
  namespace: ai-platform
spec:
  selector:
    app: cluster-dashboard
  ports:
    - port: 9090
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-platform-dashboard
  namespace: ai-platform
  annotations:
    alb.ingress.kubernetes.io/group.name: ai-platform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 9090}]'
    alb.ingress.kubernetes.io/healthcheck-path: /data.json
    alb.ingress.kubernetes.io/inbound-cidrs: 82.76.116.166/32
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cluster-dashboard
                port:
                  number: 9090
