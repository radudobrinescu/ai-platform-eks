# Registers the llm-d OCI Helm registry with ArgoCD so the Applications rendered
# by the LLMDEndpoint KRO RGD can pull the llm-d-router-standalone chart.
# Public registry — no credentials; ArgoCD only needs it declared as an OCI Helm
# source (enableOCI). No sensitive data, safe to keep in git.
apiVersion: v1
kind: Secret
metadata:
  name: llm-d-charts
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  name: llm-d-charts
  url: ghcr.io/llm-d/charts
  type: helm
  enableOCI: "true"
