apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ai-platform
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      # ServiceAccount carries the Bedrock IRSA role when enable_bedrock=true
      # (annotation injected by Terraform). Without it, this is a plain SA with
      # no AWS access — equivalent to `default`, so non-Bedrock installs are
      # unaffected. The EKS Pod Identity webhook injects AWS_REGION here when
      # the role annotation is present, which the Bedrock model config reads.
      serviceAccountName: litellm
      containers:
        - name: litellm
          image: litellm/litellm:v1.81.9-stable.patch.1
          args: ["--config", "/app/config.yaml"]
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: litellm-url
            - name: STORE_MODEL_IN_DB
              value: "True"
            # Region for the Bedrock provider. Sourced from a Terraform-managed
            # ConfigMap (created with the cluster) so it's never hardcoded in git.
            # optional:true keeps LiteLLM bootable on installs where the ConfigMap
            # isn't present (non-Terraform/dev) — Bedrock calls would then 4xx,
            # but self-hosted models are unaffected.
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: litellm-env
                  key: AWS_REGION
                  optional: true
            - name: LITELLM_CALLBACKS
              value: "langfuse"
            - name: LANGFUSE_HOST
              value: "http://langfuse-web.ai-platform.svc.cluster.local:3000"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-litellm-keys
                  key: LANGFUSE_PUBLIC_KEY
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-litellm-keys
                  key: LANGFUSE_SECRET_KEY
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-platform
data:
  config.yaml: |
    # Two model sources merge at runtime:
    #   1. Static models declared here (committed to git) — e.g. Bedrock, which
    #      has nothing to deploy/scale, so it needs no InferenceEndpoint or Job.
    #   2. Self-hosted models registered dynamically via the LiteLLM API
    #      (POST /model/new) by each InferenceEndpoint's registration Job.
    # LiteLLM merges this model_list with DB-registered models (STORE_MODEL_IN_DB=True).
    model_list:
      # Amazon Bedrock — Claude Sonnet 4.6 (the frontier commercial baseline).
      # Static endpoint: zero GPUs, no InferenceEndpoint. Auth comes from the
      # `litellm` ServiceAccount's IRSA role (terraform: enable_bedrock=true) —
      # no static keys. The `us.` prefix selects the cross-region inference
      # profile. Verify the exact model ID + region availability in the Bedrock
      # console; it's a one-line edit. Requires Bedrock model access enabled
      # in-account (a one-time console toggle) — compare-models.py preflights it.
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6-v1:0
          aws_region_name: os.environ/AWS_REGION
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ai-platform
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
      name: http
---
# Init script: creates additional databases on first PostgreSQL boot.
# Runs via docker-entrypoint-initdb.d (only on empty data directory).
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-db-init
  namespace: ai-platform
data:
  create-databases.sql: |
    CREATE DATABASE langfuse;
---
# Shared PostgreSQL for all platform services (LiteLLM, Langfuse).
# Credentials managed by Terraform (platform-db-credentials secret).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: platform-db
  namespace: ai-platform
spec:
  serviceName: platform-db
  replicas: 1
  selector:
    matchLabels:
      app: platform-db
  template:
    metadata:
      labels:
        app: platform-db
    spec:
      containers:
        - name: postgres
          image: postgres:16.6-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: password
            - name: POSTGRES_DB
              value: "litellm"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: init-scripts
          configMap:
            name: platform-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: platform-db
  namespace: ai-platform
spec:
  selector:
    app: platform-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-db
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: platform-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: ai-platform
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: litellm
  namespace: ai-platform
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: litellm
