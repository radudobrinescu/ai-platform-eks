# CloudFront edge — public HTTPS front for the platform UIs, via ACK, over a
# CloudFront VPC ORIGIN to the platform's INTERNAL ALB.
#
# OPT-IN: this directory is intentionally NOT in the platform ApplicationSet list
# (argocd/bootstrap/platform.yaml), so ArgoCD does NOT create these by default —
# each Distribution + VPC origin is a real, billable resource. Activate by adding
# an element for `platform/services/edge` to that list (see README.md).
#
# WHY VPC ORIGIN: the platform ships the shared ALB as `scheme: internal` (no
# public IP — see platform/config/ingress.yaml). A classic CloudFront custom
# origin resolves the origin's PUBLIC DNS, which an internal ALB doesn't have.
# A CloudFront VPC origin instead reaches the ALB PRIVATELY from inside the VPC,
# so the only public surface is CloudFront (HTTPS + SSO), never the ALB.
#
# ONE VPC ORIGIN PER PORT: the four UIs share one ALB but each listens on its own
# port (WebUI 8080 / LiteLLM 4000 / Langfuse 3000 / dashboard 9090). A VPC origin
# binds to a single ALB port, so there are four VPCOrigins (same ALB ARN, one per
# port), each paired with its Distribution.
#
# RECONCILE: `arn` (ALB ARN), each origin's `domainName` (ALB hostname) and
# `vpcOriginID` (from the VPCOrigin's .status.id) are all runtime values, filled
# in by the reconcile-edge Job (reconcile-edge.yaml) after the ALB and the VPC
# origins exist. Placeholders below are replaced in place; do not hand-edit.
#
# ALB SECURITY GROUP: the internal ALB's SG must allow inbound from the CloudFront
# VPC origin on each listener port. See README.md ("ALB security group") — with
# the internal default, set the shared `inbound-cidrs` to the VPC CIDR (or add the
# VPC-origin ENI subnets) so CloudFront's in-VPC network interface can reach it.
#
# CACHE: CachingDisabled (4135ea2d-...) + AllViewer origin-request policy
# (216adef6-...) so the dynamic, auth'd apps get all headers/cookies/query and
# nothing is cached. Viewer cert = the free *.cloudfront.net default (HTTPS with
# no domain/ACM). After creation, feed each distribution's domain into
# `sso_public_urls` (see README).
#
# CUSTOM DOMAIN (optional): to serve a UI on your own domain instead of the
# *.cloudfront.net default, add an `aliases` list and swap the viewer cert for
# an ACM certificate. The ACM cert MUST be in us-east-1 (CloudFront requirement),
# regardless of the cluster region. Then point your DNS (Route53 alias / CNAME)
# at the distribution's *.cloudfront.net domain and set that custom domain in
# `sso_public_urls`. See the commented example on open-webui-edge below.
---
apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: VPCOrigin
metadata:
  name: open-webui-vpco
  namespace: ai-platform
spec:
  vpcOriginEndpointConfig:
    name: open-webui-vpco
    arn: REPLACE_WITH_ALB_ARN # set by reconcile-edge Job
    httpPort: 8080
    httpsPort: 443
    originProtocolPolicy: http-only
    originSSLProtocols:
      items: ["TLSv1.2"]
---
apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: VPCOrigin
metadata:
  name: litellm-vpco
  namespace: ai-platform
spec:
  vpcOriginEndpointConfig:
    name: litellm-vpco
    arn: REPLACE_WITH_ALB_ARN # set by reconcile-edge Job
    httpPort: 4000
    httpsPort: 443
    originProtocolPolicy: http-only
    originSSLProtocols:
      items: ["TLSv1.2"]
---
apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: VPCOrigin
metadata:
  name: langfuse-vpco
  namespace: ai-platform
spec:
  vpcOriginEndpointConfig:
    name: langfuse-vpco
    arn: REPLACE_WITH_ALB_ARN # set by reconcile-edge Job
    httpPort: 3000
    httpsPort: 443
    originProtocolPolicy: http-only
    originSSLProtocols:
      items: ["TLSv1.2"]
---
apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: VPCOrigin
metadata:
  name: dashboard-vpco
  namespace: ai-platform
spec:
  vpcOriginEndpointConfig:
    name: dashboard-vpco
    arn: REPLACE_WITH_ALB_ARN # set by reconcile-edge Job
    httpPort: 9090
    httpsPort: 443
    originProtocolPolicy: http-only
    originSSLProtocols:
      items: ["TLSv1.2"]
---
apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: Distribution
metadata:
  name: open-webui-edge
  namespace: ai-platform
spec:
  distributionConfig:
    enabled: true
    comment: "ai-platform open-webui"
    priceClass: PriceClass_100
    defaultCacheBehavior:
      targetOriginID: alb
      viewerProtocolPolicy: redirect-to-https
      cachePolicyID: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
      originRequestPolicyID: "216adef6-5c7f-47e4-b989-5492eafa07d3"
      allowedMethods:
        items: ["GET", "HEAD", "OPTIONS", "PUT", "PATCH", "POST", "DELETE"]
        cachedMethods:
          items: ["GET", "HEAD"]
    origins:
      items:
        - id: alb
          domainName: REPLACE_WITH_ALB_HOSTNAME # set by reconcile-edge Job
          vpcOriginConfig:
            vpcOriginID: REPLACE_WITH_VPCORIGIN_ID # set by reconcile-edge Job (open-webui-vpco .status.id)
    # Default: free *.cloudfront.net HTTPS, no domain needed.
    viewerCertificate:
      cloudFrontDefaultCertificate: true
    # --- CUSTOM DOMAIN (optional) — replace the two blocks above/here with: ---
    # aliases:
    #   items: ["webui.example.com"]        # your domain (CNAME/alias -> this dist)
    # viewerCertificate:
    #   acmCertificateARN: "arn:aws:acm:us-east-1:<acct>:certificate/<id>"  # MUST be us-east-1
    #   sslSupportMethod: sni-only
    #   minimumProtocolVersion: TLSv1.2_2021
    # (repeat per distribution; then set the custom domain in sso_public_urls.)
---
apiVersion: cloudfront.services.k8s.aws/v1alpha1
kind: Distribution
metadata:
