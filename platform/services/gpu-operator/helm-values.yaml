# NVIDIA GPU Operator Helm Values
# Chart: nvidia/gpu-operator
# Repository: https://helm.ngc.nvidia.com/nvidia
#
# EKS Bottlerocket NVIDIA AMIs pre-include the driver, toolkit, and device plugin.
# All three must be disabled per AWS docs:
# https://docs.aws.amazon.com/eks/latest/userguide/ml-eks-optimized-ami.html

driver:
  enabled: false

toolkit:
  enabled: false

devicePlugin:
  enabled: false

dcgmExporter:
  enabled: true
  config:
    name: dcgm-metrics-no-profiling
    create: true
    data: |-
      # Non-profiling GPU metrics — compatible with time-sliced GPUs.
      # DCP/profiling fields (DCGM_FI_PROF_*) are excluded because the profiling
      # module is unavailable when Bottlerocket time-slicing is active.
      DCGM_FI_DEV_GPU_UTIL,        gauge, GPU utilization (%).
      DCGM_FI_DEV_MEM_COPY_UTIL,   gauge, Memory utilization (%).
      DCGM_FI_DEV_FB_FREE,         gauge, Frame buffer free (MiB).
      DCGM_FI_DEV_FB_USED,         gauge, Frame buffer used (MiB).
      DCGM_FI_DEV_GPU_TEMP,        gauge, GPU temperature (C).
      DCGM_FI_DEV_MEMORY_TEMP,     gauge, Memory temperature (C).
      DCGM_FI_DEV_POWER_USAGE,     gauge, Power usage (W).
      DCGM_FI_DEV_SM_CLOCK,        gauge, SM clock frequency (MHz).
      DCGM_FI_DEV_MEM_CLOCK,       gauge, Memory clock frequency (MHz).
      DCGM_FI_DEV_ENC_UTIL,        gauge, Encoder utilization (%).
      DCGM_FI_DEV_DEC_UTIL,        gauge, Decoder utilization (%).
      DCGM_FI_DEV_PCIE_TX_THROUGHPUT, gauge, PCIe TX throughput (KB/s).
      DCGM_FI_DEV_PCIE_RX_THROUGHPUT, gauge, PCIe RX throughput (KB/s).
      DCGM_FI_DEV_XID_ERRORS,      gauge, Last XID error value.

nfd:
  enabled: true

operator:
  defaultRuntime: containerd
