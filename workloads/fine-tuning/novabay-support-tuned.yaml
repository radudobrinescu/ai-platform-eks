apiVersion: kro.run/v1alpha1
kind: FineTuneJob
metadata:
  name: novabay-support-tuned
  namespace: inference
spec:
  baseModel: "unsloth/Qwen2.5-3B-Instruct-bnb-4bit"
  dataset: "s3://ai-platform-cnd-demo-training-datasets/support-transcripts.jsonl"
  datasetFormat: chatml
  epochs: 3
  loraRank: 32
  maxSeqLength: 2048
  autoDeploy: true
