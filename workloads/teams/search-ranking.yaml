# Team: Search Ranking
# Access to all models, moderate budget for experimentation.
apiVersion: kro.run/v1alpha1
kind: AITeam
metadata:
  name: team-search
  namespace: ai-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  teamName: search-ranking
  models:
    - "gemma-4b"
    - "qwen3-4b"
  maxBudget: "50.0"
  budgetDuration: "30d"
  rpmLimit: 60
  tpmLimit: 50000
