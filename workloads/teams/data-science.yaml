# Team: Data Science
# Onboarded onto the platform — gets a namespace, budget, rate limits,
# a scoped API key, and a Langfuse project tag.
apiVersion: kro.run/v1alpha1
kind: AITeam
metadata:
  name: team-data-science
  namespace: ai-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  teamName: data-science
  models:
    - "*"
  maxBudget: "100.0"
  budgetDuration: "30d"
  rpmLimit: 120
  tpmLimit: 100000
