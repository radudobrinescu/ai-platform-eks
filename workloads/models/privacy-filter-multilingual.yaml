apiVersion: kro.run/v1alpha1
kind: InferenceEndpoint
metadata:
  name: privacy-filter-multilingual
  namespace: inference
spec:
  model: "OpenMed/privacy-filter-multilingual"
  gpuCount: 1
  shared: true          # fits with headroom — up to 4 models share the GPU
  maxModelLen: 8192
  minVramPerGpuGiB: 14
  workerMemory: "8Gi"
  # maxNumSeqs: 64
  minReplicas: 1
  maxReplicas: 2
