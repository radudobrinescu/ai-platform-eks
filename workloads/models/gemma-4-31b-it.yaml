apiVersion: kro.run/v1alpha1
kind: InferenceEndpoint
metadata:
  name: gemma-4-31b-it
  namespace: inference
spec:
  model: "google/gemma-4-31B-it"
  gpuCount: 4
  tensorParallelSize: 4
  maxModelLen: 8192
  minVramPerGpuGiB: 25
  workerMemory: "63Gi"
  # maxNumSeqs: 64
  minReplicas: 1
  maxReplicas: 2
