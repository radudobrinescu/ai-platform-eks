apiVersion: kro.run/v1alpha1
kind: InferenceEndpoint
metadata:
  name: gemma-3-27b-it
  namespace: inference
spec:
  model: "google/gemma-3-27b-it"
  gpuCount: 4            # tensor-parallel across 4 GPUs
  maxModelLen: 8192
  minVramPerGpuGiB: 21   # pins Karpenter to L4-class or better → g6.12xlarge
  minReplicas: 1
  maxReplicas: 2
