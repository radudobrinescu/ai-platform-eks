apiVersion: kro.run/v1alpha1
kind: InferenceEndpoint
metadata:
  name: gemma-3-1b-it
  namespace: inference
spec:
  model: "google/gemma-3-1b-it"
  gpuCount: 1
  shared: true          # fits with headroom — up to 4 models share the GPU
  maxModelLen: 8192
  minVramPerGpuGiB: 20   # ≥20 GiB excludes T4 (16 GB) — required because gemma uses bf16 (CC ≥ 8.0; T4 is 7.5)
  workerMemory: "8Gi"   # CPU memory for the Ray worker pod (default is conservative; this is sized to model)
  minReplicas: 1
  maxReplicas: 2
