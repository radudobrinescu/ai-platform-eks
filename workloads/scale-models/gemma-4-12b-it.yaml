apiVersion: kro.run/v1alpha1
kind: LLMDEndpoint
metadata:
  name: gemma-4-12b-it
  namespace: inference
spec:
  model: "google/gemma-4-12B-it"
  gpuCount: 4
  tensorParallelSize: 4
  maxModelLen: 8192
  minVramPerGpuGiB: 10
  workerMemory: "27Gi"
  replicas: 2
  routingProfile: balanced   # EPP KV/prefix/load-aware weights for this workload
